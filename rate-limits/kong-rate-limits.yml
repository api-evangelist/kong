specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Kong
providerId: kong
created: '2026-05-04'
modified: '2026-05-15'
reconciled: true
tags:
  - Rate Limiting
  - API Gateway
  - API Management
description: Kong's pricing constrains Konnect through plan-level quotas (Plus = 1M API requests/month
  included, $200/M overage; AI Gateway = 5 LLM models included, $100/extra). The Konnect control-plane
  API itself does not publicly publish per-second / per-minute throttling thresholds in its developer
  documentation; consumers should code against the standard 429 / Retry-After contract. Kong's flagship
  product is itself a rate-limiting plugin set, applied to data-plane traffic the customer terminates.
sources:
  - https://konghq.com/pricing
  - https://developer.konghq.com/konnect-api/
notes: Konnect control-plane numeric rate limits are not publicly documented. The numbers below describe
  plan-level request quotas and AI-Gateway model caps (which are billing limits, not gateway throttling).
  Reconcile control-plane TPS limits with Kong support if needed.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Konnect Plus included API requests
    scope: organization
    metric: requests_per_month
    limit: 1000000
    timeFrame: month
    notes: Overage billed at $200 per additional 1M requests on the Plus plan; total capped at 10M requests/month on Plus (move to Enterprise for higher volume).
  - name: Konnect Plus maximum API requests
    scope: organization
    metric: requests_per_month
    limit: 10000000
    timeFrame: month
    notes: Hard plan ceiling on Plus; above this requires Enterprise.
  - name: Konnect Plus AI Gateway models
    scope: organization
    metric: llm_models
    limit: 5
    notes: Each additional unique LLM model billed at $100/month on the Plus plan.
  - name: Konnect Plus Serverless gateways
    scope: organization
    metric: gateways
    limit: 5
  - name: Konnect Plus Hybrid gateways
    scope: organization
    metric: gateways
    limit: 2
  - name: Konnect Plus Dedicated Cloud gateways
    scope: organization
    metric: gateways
    limit: 2
  - name: Konnect Plus Developer Portals
    scope: organization
    metric: portals
    limit: 2
  - name: Konnect Plus Published APIs per Portal
    scope: portal
    metric: apis
    limit: 20
    notes: First 10 published APIs billed at $20/month each, next 10 at $10/month each.
  - name: Konnect Plus Service Catalog services
    scope: organization
    metric: services
    limit: 2
    notes: Additional services require Enterprise.
  - name: Konnect control-plane API throttling
    scope: organization
    metric: varies
    limit: 'see Kong Konnect API documentation; numeric thresholds not publicly published'
policies:
  - name: Plan quota vs gateway throttling
    description: Plus-plan request and model caps are billing thresholds, not hard throttles — exceeding
      them creates overage charges, not 429 responses to your end users.
  - name: Backoff
    description: For 429/5xx from the Konnect control-plane API, retry with exponential backoff and jitter;
      honor Retry-After.
  - name: Data-plane rate limiting
    description: Customers configure their own Kong rate-limiting/rate-limiting-advanced plugins on data-plane
      gateways to throttle their consumers; that configuration is independent of the Konnect platform's
      own control-plane behavior.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
