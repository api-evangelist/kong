        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        supports_multiple_credentials:
          description: 'Indicates whether this auth strategy supports multiple credentials.

            - `true` for Key Auth strategies and when supported for Client Credentials strategies

            - `false` when not supported for Client Credentials strategies

            '
          type: boolean
          readOnly: true
      additionalProperties: false
      required:
