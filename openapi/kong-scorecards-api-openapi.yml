      description: 'Filter using **one** of the following operators: `eq`, `oeq`, `neq`'
      type: object
      properties:
        eq:
          description: The field exactly matches the provided value.
          type: string
        oeq:
          description: The field matches any of the provided values.
          type: string
        neq:
          description: The field does not match the provided value.
          type: string
      additionalProperties: false
    HasLabelKeySelector:
      description: Entity selector that includes entities by inclusion of a `label` key.
      type: object
      properties:
        selector:
          type: string
          enum:
          - has_label_key
        selector_parameters:
          type: object
          properties:
            label_key:
              type: string
          required:
          - label_key
          title: HasLabelKeySelectorParams
      required:
      - selector
      - selector_parameters
    ScorecardFilterParameters:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        score.value:
          oneOf:
          - $ref: '#/components/schemas/StringFieldFilter'
        score.raw_value:
          oneOf:
          - $ref: '#/components/schemas/NumericFieldFilter'
    CriteriaEvaluationErrorResult:
      type: object
      properties:
        relation:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
          required:
          - id
          - name
        error:
          description: 'Details about an error that occurred during evaluation preventing computation of a pass/fail result.

            Will be `null` when no error occurred.

            '
          type: object
          example: null
          nullable: true
          properties:
            type:
              description: The type of error that occurred.
              type: string
              example: integration_unauthorized
            details:
              description: Human-readable error message about the error.
              type: string
              example: 'The GitHub integration is unauthorized. Please ensure that the

                integration is re-authorized for the criteria to be successfully evaluated.

                '
          required:
          - type
          - details
      required:
      - relation
      - error
    ScorecardTemplateFilterParameters:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        display_name:
          $ref: '#/components/schemas/StringFieldFilter'
    UpdateScorecard:
      type: object
      properties:
        name:
          description: The human-readable name of the scorecard.
          type: string
          example: Incident Response
        description:
          type: string
          example: Governs key metrics pertaining to teams' incident response practices.
          nullable: true
        entity_selector:
          $ref: '#/components/schemas/ScorecardEntitySelector'
        criteria:
          type: array
          items:
            oneOf:
            - $ref: '#/components/schemas/UpdateScorecardCriteria'
            - $ref: '#/components/schemas/CreateScorecardCriteria'
          minItems: 1
        scorecard_template:
          description: 'The name of the scorecard template used to create the scorecard.

            Otherwise, `null`.

            '
          type: string
          example: kong_best_practices
          enum:
          - kong_best_practices
          - service_documentation
          - service_maturity
          - security_and_compliance
          nullable: true
          x-speakeasy-unknown-values: allow
      additionalProperties: false
      required:
      - name
      - description
      - entity_selector
      - criteria
      - scorecard_template
    TextCustomField:
      type: string
      nullable: true
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
          - dependent_fields
          nullable: true
          readOnly: true
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          items: {}
          nullable: true
          readOnly: true
          uniqueItems: true
        source:
          type: string
          example: body
      additionalProperties: false
      required:
      - field
      - rule
      - reason
      - dependents
    CriteriaEvaluationRelationResult:
      type: object
      properties:
        is_passing:
          description: Whether or not the relation has passed the criteria evaluation.
          type: boolean
        relation:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
          required:
          - id
          - name
        details:
          $ref: '#/components/schemas/CriteriaEvaluationResultDetails'
      required:
      - is_passing
      - relation
      - details
    ScorecardCriteria:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 5c1121f9-3f3a-47c7-9bb6-c81a51128714
        name:
          description: Override display name for the criteria, for greater contextual clarity within a given scorecard.
          type: string
          example: Time to restore service is less than 6 hours over the last 3 months.
          nullable: true
        scorecard_id:
          type: string
          format: uuid
          example: f3704e4c-104d-4f21-998a-20d4364c893f
        integration:
          description: The integration `name` when it provides the criteria template. Otherwise `null`.
          type: string
          example: null
          nullable: true
        enabled:
          description: Whether the criteria is enabled for the given scorecard.
          type: boolean
          example: true
        template_name:
          $ref: '#/components/schemas/CriteriaTemplateName'
        template_parameters:
          $ref: '#/components/schemas/CriteriaParameters'
        section_name:
          description: Organizational section name for the criteria within the scorecard.
          type: string
          example: Documentation
          maxLength: 120
          minLength: 1
          nullable: true
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
      - id
      - name
      - scorecard_id
      - integration
      - enabled
      - template_name
      - template_parameters
      - section_name
      - created_at
      - updated_at
    NumericFieldFilter:
      description: Filter by a numeric value.
      oneOf:
      - type: number
        description: Value strictly equals the given numeric value.
        example: 21
      - type: object
        title: NumericFieldEqualsFilter
        additionalProperties: false
        properties:
          eq:
            description: Value strictly equals the given numeric value.
            type: number
            example: 3.14
        required:
        - eq
      - type: object
        title: NumericFieldLTFilter
        additionalProperties: false
        properties:
          lt:
            description: Value is less than the given numeric value.
            type: number
            example: 10
        required:
        - lt
      - type: object
        title: NumericFieldLTEFilter
        additionalProperties: false
        properties:
          lte:
            description: Value is less than or equal to the given numeric value.
            type: number
            example: 10
        required:
        - lte
      - type: object
        title: NumericFieldGTFilter
        additionalProperties: false
        properties:
          gt:
            description: Value is greater than the given numeric value.
            type: number
            example: 1.85
        required:
        - gt
      - type: object
        title: NumericFieldGTEFilter
        additionalProperties: false
        properties:
          gte:
            description: Value is greater than or equal to the given numeric value.
            type: number
            example: 1.85
        required:
        - gte
    InvalidParameterStandard:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      additionalProperties: false
      required:
      - field
      - reason
    NumberSelectorOperator:
      type: string
      enum:
      - eq
      - lt
      - gt
      x-speakeasy-unknown-values: allow
    DateTimeFieldFilter:
      description: Filters on the given datetime (RFC-3339) field value.
      oneOf:
      - type: object
        title: DateTimeFieldEqualsFilter
        additionalProperties: false
        properties:
          eq:
            description: Value strictly equals given RFC-3339 formatted timestamp in UTC
            type: string
            format: date-time
            example: '2022-03-30T07:20:50Z'
        required:
        - eq
      - type: object
        title: DateTimeFieldLTFilter
        additionalProperties: false
        properties:
          lt:
            description: Value is less than the given RFC-3339 formatted timestamp in UTC
            type: string
            format: date-time
            example: '2022-03-30T07:20:50Z'
        required:
        - lt
      - type: object
        title: DateTimeFieldLTEFilter
        additionalProperties: false
        properties:
          lte:
            description: Value is less than or equal to the given RFC-3339 formatted timestamp in UTC
            type: string
            format: date-time
            example: '2022-03-30T07:20:50Z'
        required:
        - lte
      - type: object
        title: DateTimeFieldGTFilter
        additionalProperties: false
        properties:
          gt:
            description: Value is greater than the given RFC-3339 formatted timestamp in UTC
            type: string
            format: date-time
            example: '2022-03-30T07:20:50Z'
        required:
        - gt
      - type: object
        title: DateTimeFieldGTEFilter
        additionalProperties: false
        properties:
          gte:
            description: Value is greater than or equal to the given RFC-3339 formatted timestamp in UTC
            type: string
            format: date-time
            example: '2022-03-30T07:20:50Z'
        required:
        - gte
      title: DateTimeFieldFilter
    CriteriaTemplateName:
      description: Reference to the unique `name` of the criteria template.
      type: string
      example: time_to_merge
    NotFoundError:
      allOf:
      - $ref: '#/components/schemas/BaseError'
      - type: object
        properties:
          status:
            example: 404
          title:
            example: Not Found
          type:
            example: https://httpstatuses.com/404
          instance:
            example: kong:trace:1234567890
          detail:
            example: Not found
    LabelsFieldFilter:
      allOf:
      - title: LabelsFieldFilter
        description: "Filters on the resource's `labels` field. Filters must use dot-notation to identify\nthe label key that will be used to filter the results. For example:\n\n\n  - `filter[labels.owner]`\n  - `filter[labels.owner][neq]=kong`\n  - `filter[labels.env]=dev`\n  - `filter[labels.env][ocontains]=dev,test`\n"
      - $ref: '#/components/schemas/StringFieldFilter'
    CreateScorecard:
      type: object
      properties:
        name:
          description: The human-readable name of the scorecard.
          type: string
          example: Incident Response
        description:
          type: string
          example: Governs key metrics pertaining to teams' incident response practices.
          nullable: true
        entity_selector:
          $ref: '#/components/schemas/ScorecardEntitySelector'
        criteria:
          type: array
          items:
            $ref: '#/components/schemas/CreateScorecardCriteria'
          minItems: 1
        scorecard_template:
          description: 'The name of the scorecard template used to create the scorecard.

            Otherwise, `null`.

            '
          type: string
          example: kong_best_practices
          enum:
          - kong_best_practices
          - service_documentation
          - service_maturity
          - security_and_compliance
          nullable: true
          x-speakeasy-unknown-values: allow
      additionalProperties: false
      required:
      - name
      - description
      - entity_selector
      - criteria
      - scorecard_template
  parameters:
    PageSize:
      name: page[size]
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
      x-speakeasy-terraform-ignore: true
    ScorecardServiceSort:
      name: sort
      description: "Sorts a collection of services targeted by a scorecard. Supported sort attributes are:\n\n\n  - `display_name`\n  - `name`\n  - `score.value`\n  - `score.raw_value`\n\nDefault sort is `display_name` in ascending order.\n"
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    ScorecardCriteriaFilter:
      name: filter
      description: Filters a collection of criteria belonging to a scorecard.
      required: false
      in: query
      style: deepObject
      schema:
        $ref: '#/components/schemas/ScorecardCriteriaFilterParameters'
    ScorecardCriteriaServiceSort:
      name: sort
      description: "Sorts a collection of services targeted by a scorecard criteria. Supported sort attributes are:\n\n\n  - `display_name`\n  - `name`\n  - `evaluation.is_passing`\n  - `evaluation.successfully_evaluated_at`\n  - `evaluation.attempted_at`\n\nDefault sort is `display_name` in ascending order.\n"
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    ScorecardSort:
      name: sort
      description: "Sorts a collection of scorecards. Supported sort attributes are:\n  - `name`\n  - `score.value`\n  - `score.raw_value`\n\nDefault sort is `name` in ascending order.\n"
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    ScorecardTemplateSort:
      name: sort
      description: "Sorts a collection of scorecard templates. Supported sort attributes are:\n\n\n  - `display_name`\n  - `name`\n\nDefault sort is `display_name` in ascending order.\n"
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    ScorecardFilter:
      name: filter
      description: Filters a collection of scorecards.
      required: false
      in: query
      style: deepObject
      schema:
        $ref: '#/components/schemas/ScorecardFilterParameters'
    PageNumber:
      name: page[number]
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
      x-speakeasy-terraform-ignore: true
    ScorecardCriteriaServiceFilter:
      name: filter
      description: Filters a collection of services targeted by a scorecard criteria.
      required: false
      in: query
      style: deepObject
      schema:
        $ref: '#/components/schemas/ScorecardCriteriaServiceFilterParameters'
    ScorecardCriteriaSort:
      name: sort
      description: "Sorts a collection of criteria belonging to a scorecard. Supported sort attributes are:\n\n\n  - `evaluation.passing_services_count`\n\nBy default, criteria will be returned in the order that they are configured in the scorecard.\n"
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    ScorecardServiceFilter:
      name: filter
      description: Filters a collection of services targeted by a scorecard.
      required: false
      in: query
      style: deepObject
      schema:
        $ref: '#/components/schemas/ScorecardServiceFilterParameters'
    ScorecardTemplateFilter:
      name: filter
      description: Filters a collection of scorecard templates.
      required: false
      in: query
      style: deepObject
      schema:
        $ref: '#/components/schemas/ScorecardTemplateFilterParameters'
