          title:
            example: Unauthorized
          type:
            example: https://httpstatuses.com/401
          instance:
            example: kong:trace:1234567890
          detail:
            example: Invalid credentials
    CreateDcrProviderRequestCurity:
      description: Request body for creating a Curity DCR provider.
