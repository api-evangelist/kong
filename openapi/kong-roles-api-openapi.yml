            title: Roles Response
    IdentityPermissionDenied:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
    IdentityConflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ConflictError'
    IdentityUnauthenticated:
      description: Unauthenticated
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
    AssignedRoleSingle:
      description: A get action response of a single assigned role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AssignedRole'
    AssignedRoleCollection:
      description: A paginated list response for a collection of assigned roles.
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                description: An Array
                type: array
                items:
                  $ref: '#/components/schemas/AssignedRole'
            title: Assigned Role Collection Response
    IdentityBadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    IdentityNotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
  requestBodies:
    AssignRole:
      content:
        application/json:
          schema:
            description: An assigned role is a role that has been assigned to a user or team.
            type: object
            properties:
              role_name:
                description: The desired role.
                type: string
                example: Viewer
                enum:
                - Admin
                - Appearance Maintainer
                - Application Registration
                - Certificate Admin
                - Cloud Gateway Cluster Admin
                - Cloud Gateway Cluster Viewer
                - Consumer Admin
                - Connector
                - Creator
                - Debug Session Creator
                - Deployer
                - Discovery Admin
                - Discovery Viewer
                - Editor
                - Gateway Service Admin
                - Integration Admin
                - Integration Viewer
                - Key Admin
                - Maintainer
                - Network Admin
                - Network Creator
                - Network Viewer
                - Plugin Admin
                - Plugins Admin
                - Product Publisher
                - Publisher
                - Route Admin
                - SNI Admin
                - Scorecard Admin
                - Scorecard Viewer
                - Service Admin
                - Service Creator
                - Service Viewer
                - Upstream Admin
                - Vault Admin
                - Viewer
                - Registration Approver
                - Content Editor
                - Add On Admin
                - Add On Viewer
                x-speakeasy-unknown-values: allow
              entity_id:
                description: The ID of the entity.
                type: string
                format: uuid
                example: e67490ce-44dc-4cbd-b65e-b52c746fc26a
              entity_type_name:
                description: The type of entity.
                type: string
                example: Control Planes
                enum:
                - Add Ons
                - APIs
                - API Products
                - Application Auth Strategies
                - Audit Logs
                - Control Planes
                - Dashboards
                - DCR Providers
                - Identity
                - Mesh Control Planes
                - Networks
                - Portals
                - Reports
                - Service Hub
                x-speakeasy-unknown-values: allow
              entity_region:
                description: Region of the team.
                type: string
                example: eu
                enum:
                - us
                - eu
                - au
                - me
                - in
                - sg
                - '*'
                x-speakeasy-unknown-values: allow
      description: The request schema for assigning a role.
  securitySchemes:
    adminToken:
      in: header
      name: Kong-Admin-Token
      type: apiKey
