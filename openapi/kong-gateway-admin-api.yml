openapi: 3.1.0
info:
  title: Kong Gateway Admin API
  description: >-
    The Kong Gateway Admin API is an internal RESTful API for administration
    purposes. It provides full control over a Kong Gateway instance, enabling
    management of services, routes, plugins, consumers, and upstream targets.
    By default the Admin API listens on port 8001.
  version: 3.13.0
  contact:
    name: Kong Inc.
    url: https://konghq.com
    email: support@konghq.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://konghq.com/wp-content/uploads/2018/05/kong-logo.png

servers:
  - url: http://localhost:8001
    description: Default Admin API (HTTP)
  - url: https://localhost:8444
    description: Default Admin API (HTTPS)

tags:
  - name: Information
    description: General information about the Kong Gateway node.
  - name: Services
    description: >-
      A Service object represents each of your own upstream services that Kong
      Gateway proxies. Services are the core entities used to configure the
      upstream URL that incoming requests are forwarded to.
  - name: Routes
    description: >-
      A Route defines rules to match client requests and is associated with a
      Service. When a request matches a Route, Kong proxies it to the
      associated Service.
  - name: Consumers
    description: >-
      A Consumer represents a developer or machine using the API. Consumers are
      used to control who can access APIs through authentication plugins.
  - name: Plugins
    description: >-
      A Plugin entity represents a plugin configuration that will be executed
      during the HTTP request/response lifecycle. Plugins can be applied
      globally, to a Service, a Route, or a Consumer.
  - name: Upstreams
    description: >-
      An Upstream object represents a virtual hostname and can be used to
      health-check, circuit-break, and load-balance incoming requests over
      multiple target backend services.
  - name: Targets
    description: >-
      A Target is an IP address or hostname with a port that identifies an
      instance of a backend service behind an Upstream.
  - name: Certificates
    description: >-
      A Certificate object represents a public certificate that can be used for
      TLS termination of encrypted requests.
  - name: SNIs
    description: >-
      An SNI object represents a many-to-one mapping of hostnames to a
      Certificate. A Certificate can have many hostnames associated with it.
  - name: Tags
    description: >-
      Tags are strings associated with entities for grouping and filtering.

paths:
  /:
    get:
      operationId: getNodeInformation
      summary: Retrieve node information
      description: >-
        Returns general details about the Kong Gateway node including version,
        available plugins, and configuration.
      tags:
        - Information
      responses:
        '200':
          description: Node information retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeInfo'

  /status:
    get:
      operationId: getNodeStatus
      summary: Retrieve node status
      description: >-
        Returns usage information about the node with connection counts and
        database reachability.
      tags:
        - Information
      responses:
        '200':
          description: Node status retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeStatus'

  /services:
    get:
      operationId: listServices
      summary: List all services
      description: Returns a paginated list of all registered Service entities.
      tags:
        - Services
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Tags'
      responses:
        '200':
          description: A paginated list of services.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'
    post:
      operationId: createService
      summary: Create a new service
      description: Creates a new Service entity.
      tags:
        - Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceInput'
      responses:
        '201':
          description: Service created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '409':
          description: Conflict - a Service with the same name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /services/{service_id_or_name}:
    parameters:
      - $ref: '#/components/parameters/ServiceIdOrName'
    get:
      operationId: getService
      summary: Retrieve a service
      description: Returns details of a specific Service by ID or name.
      tags:
        - Services
      responses:
        '200':
          description: Service retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateService
      summary: Update a service
      description: Updates an existing Service entity with partial data.
      tags:
        - Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceInput'
      responses:
        '200':
          description: Service updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: upsertService
      summary: Create or update a service
      description: >-
        Inserts or replaces a Service by ID or name. If a Service with the
        given identifier exists it is replaced; otherwise it is created.
      tags:
        - Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceInput'
      responses:
        '200':
          description: Service replaced successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '201':
          description: Service created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
    delete:
      operationId: deleteService
      summary: Delete a service
      description: Deletes a specific Service by ID or name.
      tags:
        - Services
      responses:
        '204':
          description: Service deleted successfully.
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

