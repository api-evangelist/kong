        schema:
          type: string
    delete:
      operationId: deleteTarget
      summary: Delete a target
      description: Deletes a specific Target from a given Upstream.
      tags:
        - Targets
      responses:
        '204':
          description: Target deleted successfully.
        '404':
          description: Target not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /certificates:
    get:
      operationId: listCertificates
      summary: List all certificates
      description: Returns a paginated list of all Certificate entities.
      tags:
        - Certificates
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Tags'
      responses:
        '200':
          description: A paginated list of certificates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateList'
    post:
      operationId: createCertificate
      summary: Create a certificate
      description: Creates a new Certificate entity.
      tags:
        - Certificates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateInput'
      responses:
        '201':
          description: Certificate created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'

  /certificates/{certificate_id}:
    parameters:
      - name: certificate_id
        in: path
        required: true
        description: The unique identifier of the Certificate.
        schema:
          type: string
          format: uuid
    get:
      operationId: getCertificate
      summary: Retrieve a certificate
      description: Returns details of a specific Certificate by ID.
      tags:
        - Certificates
      responses:
        '200':
          description: Certificate retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '404':
          description: Certificate not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateCertificate
      summary: Update a certificate
      description: Updates an existing Certificate entity with partial data.
      tags:
        - Certificates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateInput'
      responses:
        '200':
          description: Certificate updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
    delete:
      operationId: deleteCertificate
      summary: Delete a certificate
      description: Deletes a specific Certificate by ID.
      tags:
        - Certificates
      responses:
        '204':
          description: Certificate deleted successfully.

  /tags:
    get:
      operationId: listTags
      summary: List all tags
      description: >-
        Returns a paginated list of all tags currently used by entities across
        the Kong Gateway instance.
      tags:
        - Tags
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: A paginated list of tags.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        entity_name:
                          type: string
                        entity_id:
                          type: string
                        tag:
                          type: string
                  offset:
                    type: string

components:
  parameters:
    Offset:
      name: offset
      in: query
      description: Cursor for pagination. Use the offset value from the previous response.
      required: false
      schema:
        type: string

    Size:
      name: size
      in: query
      description: Number of entities to return per page (max 1000, default 100).
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000

    Tags:
      name: tags
      in: query
      description: >-
        A comma-separated list of tags to filter entities by. Use a slash to
        denote AND (tag1/tag2) or a comma to denote OR (tag1,tag2).
      required: false
      schema:
        type: string

    ServiceIdOrName:
      name: service_id_or_name
      in: path
      required: true
      description: The unique identifier (UUID) or name of the Service.
      schema:
        type: string

    RouteIdOrName:
      name: route_id_or_name
      in: path
      required: true
      description: The unique identifier (UUID) or name of the Route.
      schema:
        type: string

    ConsumerIdOrUsername:
      name: consumer_id_or_username
      in: path
      required: true
      description: The unique identifier (UUID) or username of the Consumer.
      schema:
        type: string

    PluginId:
      name: plugin_id
      in: path
      required: true
      description: The unique identifier (UUID) of the Plugin.
      schema:
        type: string
        format: uuid

    UpstreamIdOrName:
      name: upstream_id_or_name
      in: path
      required: true
      description: The unique identifier (UUID) or name of the Upstream.
      schema:
        type: string

  schemas:
    Service:
      type: object
      description: >-
        A Service entity represents an upstream API or microservice that Kong
        Gateway forwards requests to.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the Service.
          readOnly: true
        name:
          type: string
          description: An optional human-readable name for the Service.
        protocol:
          type: string
          description: The protocol used to communicate with the upstream.
          enum:
            - http
            - https
            - grpc
            - grpcs
            - tcp
            - tls
            - udp
            - ws
            - wss
          default: http
        host:
          type: string
          description: The host of the upstream server.
        port:
          type: integer
          description: The upstream server port.
          default: 80
          minimum: 0
          maximum: 65535
        path:
          type: string
          description: The path to be used in requests to the upstream server.
        retries:
          type: integer
          description: The number of retries to execute upon failure to proxy.
          default: 5
        connect_timeout:
          type: integer
          description: >-
            The timeout in milliseconds for establishing a connection to the
            upstream server.
          default: 60000
        write_timeout:
          type: integer
          description: >-
            The timeout in milliseconds between two successive write
            operations for transmitting a request to the upstream server.
          default: 60000
        read_timeout:
          type: integer
          description: >-
            The timeout in milliseconds between two successive read
            operations for receiving a request from the upstream server.
          default: 60000
        url:
          type: string
          description: >-
            Shorthand attribute to set protocol, host, port, and path at once.
            Write-only convenience field.
          writeOnly: true
        tags:
          type: array
          description: An optional set of strings for grouping and filtering.
          items:
            type: string
          maxItems: 20
        client_certificate:
          type: object
          description: Certificate to be used as client certificate while TLS handshaking to the upstream server.
          properties:
            id:
              type: string
              format: uuid
        tls_verify:
          type: boolean
          description: Whether to enable TLS verification of upstream server certificate.
        tls_verify_depth:
          type: integer
          description: Maximum depth of chain while verifying upstream server TLS certificate.
        ca_certificates:
          type: array
          description: Array of CA Certificate object UUIDs used to verify upstream server TLS certificate.
          items:
            type: string
            format: uuid
        enabled:
          type: boolean
          description: Whether the Service is active.
          default: true
        created_at:
          type: integer
          description: Unix epoch timestamp of when the entity was created.
          readOnly: true
        updated_at:
          type: integer
          description: Unix epoch timestamp of when the entity was last updated.
          readOnly: true
      required:
        - host

    ServiceInput:
      type: object
      description: Input schema for creating or updating a Service.
      properties:
        name:
          type: string
          description: An optional human-readable name for the Service.
        protocol:
          type: string
          enum:
            - http
            - https
            - grpc
            - grpcs
            - tcp
            - tls
            - udp
            - ws
            - wss
          default: http
        host:
          type: string
          description: The host of the upstream server.
        port:
          type: integer
          default: 80
          minimum: 0
          maximum: 65535
        path:
          type: string
        retries:
          type: integer
          default: 5
        connect_timeout:
          type: integer
          default: 60000
        write_timeout:
          type: integer
          default: 60000
        read_timeout:
          type: integer
          default: 60000
        url:
          type: string
          description: >-
            Shorthand attribute to set protocol, host, port, and path at once.
          writeOnly: true
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        client_certificate:
          type: object
          properties:
            id:
              type: string
              format: uuid
        tls_verify:
          type: boolean
        tls_verify_depth:
          type: integer
        ca_certificates:
          type: array
          items:
            type: string
            format: uuid
        enabled:
          type: boolean
          default: true

    ServiceList:
      type: object
      description: A paginated list of Service entities.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Service'
        next:
          type: string
          description: URI to the next page of results.
        offset:
          type: string
          description: Offset token for the next page.

    Route:
      type: object
      description: >-
        A Route defines rules to match client requests. Each Route is
        associated with a Service, and a Service may have multiple Routes.
        When a request matches a Route, Kong proxies the request to the
        associated Service.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the Route.
          readOnly: true
        name:
          type: string
          description: An optional human-readable name for the Route.
        protocols:
          type: array
          description: An array of the protocols this Route should allow.
          items:
            type: string
            enum:
              - http
              - https
              - grpc
              - grpcs
              - tcp
              - tls
              - udp
              - ws
              - wss
          default:
            - http
            - https
        methods:
          type: array
          description: A list of HTTP methods that match this Route.
          items:
            type: string
            enum:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
              - HEAD
              - CONNECT
              - TRACE
        hosts:
          type: array
          description: A list of domain names that match this Route.
          items:
            type: string
        paths:
          type: array
          description: A list of paths that match this Route.
          items:
            type: string
        headers:
          type: object
          description: >-
            One or more lists of values indexed by header name that will cause
            this Route to match if present in the request.
          additionalProperties:
            type: array
            items:
              type: string
        snis:
          type: array
          description: A list of SNIs that match this Route when using stream routing.
          items:
            type: string
        sources:
          type: array
          description: A list of IP sources of incoming connections that match this Route (stream routing).
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
        destinations:
          type: array
          description: A list of IP destinations of incoming connections that match this Route (stream routing).
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
        https_redirect_status_code:
          type: integer
          description: The status code Kong responds with when all properties of a Route match except the protocol.
          default: 426
          enum:
            - 301
            - 302
            - 307
            - 308
            - 426
        regex_priority:
          type: integer
          description: A number used to choose which Route resolves a given request when several Routes match it using regexes simultaneously.
          default: 0
        strip_path:
          type: boolean
          description: When matching a Route via one of the paths, strip the matching prefix from the upstream request URL.
          default: true
        path_handling:
          type: string
          description: Controls how the Service path, Route path, and requested path are combined when sending a request to the upstream.
          enum:
            - v0
            - v1
          default: v0
        preserve_host:
          type: boolean
          description: When matching a Route via one of the hosts domain names, use the request Host header in the upstream request headers.
          default: false
        request_buffering:
          type: boolean
          description: Whether to enable request body buffering.
          default: true
        response_buffering:
          type: boolean
          description: Whether to enable response body buffering.
          default: true
        tags:
          type: array
          description: An optional set of strings for grouping and filtering.
          items:
            type: string
          maxItems: 20
        service:
          type: object
          description: The Service this Route is associated with.
          properties:
            id:
              type: string
              format: uuid
        expression:
          type: string
          description: The router expression for the Route (expressions router mode).
        priority:
          type: integer
          description: The priority of the Route in expressions router mode.
          default: 0
        created_at:
          type: integer
          description: Unix epoch timestamp of when the entity was created.
          readOnly: true
        updated_at:
          type: integer
          description: Unix epoch timestamp of when the entity was last updated.
          readOnly: true

    RouteInput:
      type: object
      description: Input schema for creating or updating a Route.
      properties:
        name:
          type: string
        protocols:
          type: array
          items:
            type: string
            enum:
              - http
              - https
              - grpc
              - grpcs
              - tcp
              - tls
              - udp
              - ws
              - wss
          default:
            - http
            - https
        methods:
          type: array
          items:
            type: string
        hosts:
          type: array
          items:
            type: string
        paths:
          type: array
          items:
            type: string
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        snis:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
        destinations:
          type: array
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
        https_redirect_status_code:
          type: integer
          default: 426
        regex_priority:
          type: integer
          default: 0
        strip_path:
          type: boolean
          default: true
        path_handling:
          type: string
          enum:
            - v0
            - v1
          default: v0
        preserve_host:
          type: boolean
          default: false
        request_buffering:
          type: boolean
          default: true
        response_buffering:
          type: boolean
          default: true
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        service:
          type: object
          properties:
            id:
              type: string
              format: uuid
        expression:
          type: string
        priority:
          type: integer
          default: 0

    RouteList:
      type: object
      description: A paginated list of Route entities.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Route'
        next:
          type: string
        offset:
          type: string

    Consumer:
      type: object
      description: >-
        A Consumer represents a developer or machine using the API. Consumers
        are used with authentication plugins to identify and control API access.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the Consumer.
          readOnly: true
        username:
          type: string
          description: >-
            The unique username of the Consumer. At least one of username or
            custom_id must be specified.
        custom_id:
          type: string
          description: >-
            A custom identifier for the Consumer. At least one of username or
            custom_id must be specified.
        tags:
          type: array
          description: An optional set of strings for grouping and filtering.
          items:
            type: string
          maxItems: 20
        created_at:
          type: integer
          description: Unix epoch timestamp of when the entity was created.
          readOnly: true
        updated_at:
          type: integer
          description: Unix epoch timestamp of when the entity was last updated.
          readOnly: true

    ConsumerInput:
      type: object
      description: Input schema for creating or updating a Consumer.
      properties:
        username:
          type: string
        custom_id:
          type: string
        tags:
          type: array
          items:
            type: string
          maxItems: 20

    ConsumerList:
      type: object
      description: A paginated list of Consumer entities.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Consumer'
        next:
          type: string
        offset:
          type: string

    Plugin:
      type: object
      description: >-
        A Plugin entity represents a plugin configuration that will be executed
        during the HTTP request/response lifecycle. Plugins provide extra
        functionality such as authentication, rate limiting, and transformations.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the Plugin.
          readOnly: true
        name:
          type: string
          description: The name of the plugin (e.g., rate-limiting, key-auth, cors).
        instance_name:
          type: string
          description: An optional custom name to identify an instance of the plugin.
        config:
          type: object
          description: >-
            The configuration properties for the Plugin which vary depending on
            the plugin being configured.
          additionalProperties: true
        protocols:
          type: array
          description: A list of the request protocols that will trigger this plugin.
          items:
            type: string
            enum:
              - http
              - https
              - grpc
              - grpcs
              - tcp
              - tls
              - udp
              - ws
              - wss
        enabled:
          type: boolean
          description: Whether the plugin is applied.
          default: true
        tags:
          type: array
          description: An optional set of strings for grouping and filtering.
          items:
            type: string
          maxItems: 20
        ordering:
          type: object
          description: >-
            Describes a dependency to another plugin to determine plugin ordering
            during the access phase (Enterprise only).
          properties:
            before:
              type: object
              properties:
                access:
                  type: array
                  items:
                    type: string
            after:
              type: object
              properties:
                access:
                  type: array
                  items:
                    type: string
        service:
          type: object
          description: If set, the plugin will only activate when receiving requests via the specified Service.
          properties:
            id:
              type: string
              format: uuid
        route:
          type: object
          description: If set, the plugin will only activate when receiving requests via the specified Route.
          properties:
            id:
              type: string
              format: uuid
        consumer:
          type: object
          description: If set, the plugin will activate only for requests where the specified Consumer has been authenticated.
          properties:
            id:
              type: string
              format: uuid
        consumer_group:
          type: object
          description: If set, the plugin will activate only for requests within the specified Consumer Group.
          properties:
            id:
              type: string
              format: uuid
        created_at:
          type: integer
          description: Unix epoch timestamp of when the entity was created.
          readOnly: true
        updated_at:
          type: integer
          description: Unix epoch timestamp of when the entity was last updated.
          readOnly: true
      required:
        - name

    PluginInput:
      type: object
      description: Input schema for creating or updating a Plugin.
      properties:
        name:
          type: string
          description: The name of the plugin.
        instance_name:
          type: string
        config:
          type: object
          additionalProperties: true
        protocols:
          type: array
          items:
            type: string
            enum:
              - http
              - https
              - grpc
              - grpcs
              - tcp
              - tls
              - udp
              - ws
              - wss
        enabled:
          type: boolean
          default: true
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        ordering:
          type: object
          properties:
            before:
              type: object
              properties:
                access:
                  type: array
                  items:
                    type: string
            after:
              type: object
              properties:
                access:
                  type: array
                  items:
                    type: string
        service:
          type: object
          properties:
            id:
              type: string
              format: uuid
        route:
          type: object
          properties:
            id:
              type: string
              format: uuid
        consumer:
          type: object
          properties:
            id:
              type: string
              format: uuid
        consumer_group:
          type: object
          properties:
            id:
              type: string
              format: uuid
      required:
        - name

    PluginList:
      type: object
      description: A paginated list of Plugin entities.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Plugin'
        next:
          type: string
        offset:
          type: string

    Upstream:
      type: object
      description: >-
        An Upstream object represents a virtual hostname and can be used to
        health-check, circuit-break, and load-balance incoming requests over
        multiple services.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: A hostname which must be equal to the host of a Service.
        algorithm:
          type: string
          description: The load balancing algorithm to use.
          enum:
            - round-robin
            - consistent-hashing
            - least-connections
            - latency
          default: round-robin
        hash_on:
          type: string
          description: What to use as hashing input when the consistent-hashing algorithm is selected.
          enum:
            - none
            - consumer
            - ip
            - header
            - cookie
            - path
            - query_arg
            - uri_capture
          default: none
        hash_fallback:
          type: string
          description: What to use as hashing input if the primary hash_on does not return a hash.
          enum:
            - none
            - consumer
            - ip
            - header
            - cookie
            - path
            - query_arg
            - uri_capture
          default: none
        hash_on_header:
          type: string
          description: The header name to take the value from as hash input (when hash_on is set to header).
        hash_fallback_header:
          type: string
        hash_on_cookie:
          type: string
        hash_on_cookie_path:
          type: string
          default: /
        hash_on_query_arg:
          type: string
        hash_fallback_query_arg:
          type: string
        hash_on_uri_capture:
          type: string
        hash_fallback_uri_capture:
          type: string
        slots:
          type: integer
          description: The number of slots in the load balancer algorithm.
          default: 10000
          minimum: 10
          maximum: 65536
        healthchecks:
          $ref: '#/components/schemas/Healthchecks'
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        host_header:
          type: string
          description: The hostname to be used as Host header when proxying requests through ring-balancer.
        use_srv_name:
          type: boolean
          description: If set, balancer will use SRV hostname as the proxy Host header.
          default: false
        created_at:
          type: integer
          readOnly: true
        updated_at:
          type: integer
          readOnly: true
      required:
        - name

    UpstreamInput:
      type: object
      properties:
        name:
          type: string
        algorithm:
          type: string
          enum:
            - round-robin
            - consistent-hashing
            - least-connections
            - latency
          default: round-robin
        hash_on:
          type: string
          enum:
            - none
            - consumer
            - ip
            - header
            - cookie
            - path
            - query_arg
            - uri_capture
          default: none
        hash_fallback:
          type: string
          enum:
            - none
            - consumer
            - ip
            - header
            - cookie
            - path
            - query_arg
            - uri_capture
          default: none
        hash_on_header:
          type: string
        hash_fallback_header:
          type: string
        hash_on_cookie:
          type: string
        hash_on_cookie_path:
          type: string
          default: /
        hash_on_query_arg:
          type: string
        hash_fallback_query_arg:
          type: string
        hash_on_uri_capture:
          type: string
        hash_fallback_uri_capture:
          type: string
        slots:
          type: integer
          default: 10000
          minimum: 10
          maximum: 65536
        healthchecks:
          $ref: '#/components/schemas/Healthchecks'
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        host_header:
          type: string
        use_srv_name:
          type: boolean
          default: false
      required:
        - name

    UpstreamList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Upstream'
        next:
          type: string
        offset:
          type: string

    Healthchecks:
      type: object
      description: Health check configuration for an upstream.
      properties:
        active:
          type: object
          properties:
            type:
              type: string
              enum:
                - http
                - https
                - tcp
              default: http
            timeout:
              type: integer
              default: 1
            concurrency:
              type: integer
              default: 10
            http_path:
              type: string
              default: /
            https_verify_certificate:
              type: boolean
              default: true
            https_sni:
              type: string
            headers:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            healthy:
              type: object
              properties:
                interval:
                  type: integer
                  default: 0
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [200, 302]
                successes:
                  type: integer
                  default: 0
            unhealthy:
              type: object
              properties:
                interval:
                  type: integer
                  default: 0
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [429, 404, 500, 501, 502, 503, 504, 505]
                tcp_failures:
                  type: integer
                  default: 0
                timeouts:
                  type: integer
                  default: 0
                http_failures:
                  type: integer
                  default: 0
        passive:
          type: object
          properties:
            type:
              type: string
              enum:
                - http
                - https
                - tcp
              default: http
            healthy:
              type: object
              properties:
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [200, 201, 202, 203, 204, 205, 206, 207, 208, 226, 300, 301, 302, 303, 304, 305, 306, 307, 308]
                successes:
                  type: integer
                  default: 0
            unhealthy:
              type: object
              properties:
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [429, 500, 503]
                tcp_failures:
                  type: integer
                  default: 0
                timeouts:
                  type: integer
                  default: 0
                http_failures:
                  type: integer
                  default: 0
        threshold:
          type: number
          default: 0

    Target:
      type: object
      description: >-
        A Target is an IP address/hostname with a port that identifies an
        instance of a backend service.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        target:
          type: string
          description: The target address (IP or hostname) and port (host:port).
        weight:
          type: integer
          description: The weight this target gets within the upstream (0-65535). 0 means the target is disabled.
          default: 100
          minimum: 0
          maximum: 65535
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        upstream:
          type: object
          properties:
            id:
              type: string
              format: uuid
        created_at:
          type: number
          readOnly: true
        updated_at:
          type: number
          readOnly: true
      required:
        - target

    TargetInput:
      type: object
      properties:
        target:
          type: string
          description: The target address (IP or hostname) and port.
        weight:
          type: integer
          default: 100
          minimum: 0
          maximum: 65535
        tags:
          type: array
          items:
            type: string
          maxItems: 20
      required:
        - target

    TargetList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Target'
        next:
          type: string
        offset:
          type: string

    Certificate:
      type: object
      description: A Certificate object represents a public certificate for TLS termination.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        cert:
          type: string
          description: PEM-encoded public certificate chain.
        key:
          type: string
          description: PEM-encoded private key of the certificate.
        cert_alt:
          type: string
          description: PEM-encoded public certificate chain of the alternate certificate.
        key_alt:
          type: string
          description: PEM-encoded private key of the alternate certificate.
        snis:
          type: array
          description: The list of SNI hostnames associated with this certificate.
          items:
            type: string
        tags:
          type: array
          items:
            type: string
          maxItems: 20
        created_at:
          type: integer
          readOnly: true
        updated_at:
          type: integer
          readOnly: true
      required:
        - cert
        - key

    CertificateInput:
      type: object
      properties:
        cert:
          type: string
        key:
          type: string
        cert_alt:
          type: string
        key_alt:
          type: string
        snis:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
          maxItems: 20
      required:
        - cert
        - key

    CertificateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Certificate'
        next:
          type: string
        offset:
          type: string

    NodeInfo:
      type: object
      description: General details about the Kong Gateway node.
      properties:
        version:
          type: string
          description: The version of the Kong Gateway instance.
        lua_version:
          type: string
          description: The version of the Lua runtime.
        tagline:
          type: string
        hostname:
          type: string
        node_id:
          type: string
          format: uuid
        timers:
          type: object
          properties:
            pending:
              type: integer
            running:
              type: integer
        plugins:
          type: object
          properties:
            available_on_server:
              type: object
              additionalProperties:
                type: boolean
            enabled_in_cluster:
              type: array
              items:
                type: string
        configuration:
          type: object
          additionalProperties: true

    NodeStatus:
      type: object
      description: Status information about the Kong Gateway node.
      properties:
        database:
          type: object
          properties:
            reachable:
              type: boolean
        memory:
          type: object
          properties:
            workers_lua_vms:
              type: array
              items:
                type: object
                properties:
                  http_allocated_gc:
                    type: string
                  pid:
                    type: integer
            lua_shared_dicts:
              type: object
              additionalProperties:
                type: object
                properties:
                  allocated_slabs:
                    type: string
                  capacity:
                    type: string
        server:
          type: object
          properties:
            connections_accepted:
              type: integer
            connections_active:
              type: integer
            connections_handled:
              type: integer
            connections_reading:
              type: integer
            connections_waiting:
              type: integer
            connections_writing:
              type: integer
            total_requests:
              type: integer
        configuration_hash:
          type: string

    Error:
      type: object
      description: Standard error response from the Admin API.
      properties:
        message:
          type: string
          description: A human-readable error message.
        name:
          type: string
          description: The error type name.
        code:
          type: integer
          description: An optional error code.
        fields:
          type: object
          description: Field-level validation errors.
          additionalProperties: true
