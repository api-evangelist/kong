    Upstream:
      type: object
      description: >-
        An Upstream object represents a virtual hostname and can be used to
        health-check, circuit-break, and load-balance incoming requests over
        multiple services.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: abc123
        name:
          type: string
          description: A hostname which must be equal to the host of a Service.
          example: Example Title
        algorithm:
          type: string
          description: The load balancing algorithm to use.
          enum:
          - round-robin
          - consistent-hashing
          - least-connections
          - latency
          default: round-robin
          example: round-robin
        hash_on:
          type: string
          description: What to use as hashing input when the consistent-hashing algorithm is selected.
          enum:
          - none
          - consumer
          - ip
          - header
          - cookie
          - path
          - query_arg
          - uri_capture
          default: none
          example: none
        hash_fallback:
          type: string
          description: What to use as hashing input if the primary hash_on does not return a hash.
          enum:
          - none
          - consumer
          - ip
          - header
          - cookie
          - path
          - query_arg
          - uri_capture
          default: none
          example: none
        hash_on_header:
          type: string
          description: The header name to take the value from as hash input (when hash_on is set to header).
          example: example_value
        hash_fallback_header:
          type: string
          example: example_value
        hash_on_cookie:
          type: string
          example: example_value
        hash_on_cookie_path:
          type: string
          default: /
          example: example_value
        hash_on_query_arg:
          type: string
          example: example_value
        hash_fallback_query_arg:
          type: string
          example: example_value
        hash_on_uri_capture:
          type: string
          example: example_value
        hash_fallback_uri_capture:
          type: string
          example: example_value
        slots:
          type: integer
          description: The number of slots in the load balancer algorithm.
          default: 10000
          minimum: 10
          maximum: 65536
          example: 10
        healthchecks:
          $ref: '#/components/schemas/Healthchecks'
        tags:
          type: array
          items:
            type: string
          maxItems: 20
          example: []
        host_header:
          type: string
          description: The hostname to be used as Host header when proxying requests through ring-balancer.
          example: example_value
        use_srv_name:
          type: boolean
          description: If set, balancer will use SRV hostname as the proxy Host header.
          default: false
          example: true
        created_at:
          type: integer
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updated_at:
          type: integer
          readOnly: true
          example: '2026-01-15T10:30:00Z'
      required:
      - name

    UpstreamInput:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        algorithm:
          type: string
          enum:
          - round-robin
          - consistent-hashing
          - least-connections
          - latency
          default: round-robin
          example: round-robin
        hash_on:
          type: string
          enum:
          - none
          - consumer
          - ip
          - header
          - cookie
          - path
          - query_arg
          - uri_capture
          default: none
          example: none
        hash_fallback:
          type: string
          enum:
          - none
          - consumer
          - ip
          - header
          - cookie
          - path
          - query_arg
          - uri_capture
          default: none
          example: none
        hash_on_header:
          type: string
          example: example_value
        hash_fallback_header:
          type: string
          example: example_value
        hash_on_cookie:
          type: string
          example: example_value
        hash_on_cookie_path:
          type: string
          default: /
          example: example_value
        hash_on_query_arg:
