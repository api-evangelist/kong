    Healthchecks:
      type: object
      description: Health check configuration for an upstream.
      properties:
        active:
          type: object
          properties:
            type:
              type: string
              enum:
              - http
              - https
              - tcp
              default: http
            timeout:
              type: integer
              default: 1
            concurrency:
              type: integer
              default: 10
            http_path:
              type: string
              default: /
            https_verify_certificate:
              type: boolean
              default: true
            https_sni:
              type: string
            headers:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            healthy:
              type: object
              properties:
                interval:
                  type: integer
                  default: 0
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [200, 302]
                successes:
                  type: integer
                  default: 0
            unhealthy:
              type: object
              properties:
                interval:
                  type: integer
                  default: 0
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [429, 404, 500, 501, 502, 503, 504, 505]
                tcp_failures:
                  type: integer
                  default: 0
                timeouts:
                  type: integer
                  default: 0
                http_failures:
                  type: integer
                  default: 0
          example: example_value
        passive:
          type: object
          properties:
            type:
              type: string
              enum:
              - http
              - https
              - tcp
              default: http
            healthy:
              type: object
              properties:
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [200, 201, 202, 203, 204, 205, 206, 207, 208, 226, 300, 301, 302, 303, 304, 305, 306, 307, 308]
                successes:
                  type: integer
                  default: 0
            unhealthy:
              type: object
              properties:
                http_statuses:
                  type: array
                  items:
                    type: integer
                  default: [429, 500, 503]
                tcp_failures:
                  type: integer
                  default: 0
                timeouts:
                  type: integer
                  default: 0
                http_failures:
                  type: integer
                  default: 0
          example: example_value
        threshold:
          type: number
          default: 0

          example: 42.5
