components:
  parameters:
    Offset:
      name: offset
      in: query
      description: Cursor for pagination. Use the offset value from the previous response.
      required: false
      schema:
        type: string

    Size:
      name: size
      in: query
      description: Number of entities to return per page (max 1000, default 100).
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000

    Tags:
      name: tags
      in: query
      description: >-
        A comma-separated list of tags to filter entities by. Use a slash to
        denote AND (tag1/tag2) or a comma to denote OR (tag1,tag2).
      required: false
      schema:
        type: string

    ServiceIdOrName:
      name: service_id_or_name
      in: path
      required: true
      description: The unique identifier (UUID) or name of the Service.
      schema:
        type: string

    RouteIdOrName:
      name: route_id_or_name
      in: path
      required: true
      description: The unique identifier (UUID) or name of the Route.
      schema:
        type: string

    ConsumerIdOrUsername:
      name: consumer_id_or_username
      in: path
      required: true
      description: The unique identifier (UUID) or username of the Consumer.
      schema:
        type: string

    PluginId:
      name: plugin_id
      in: path
      required: true
      description: The unique identifier (UUID) of the Plugin.
      schema:
        type: string
        format: uuid

    UpstreamIdOrName:
      name: upstream_id_or_name
      in: path
      required: true
      description: The unique identifier (UUID) or name of the Upstream.
      schema:
        type: string

  schemas:
    Service:
      type: object
      description: >-
        A Service entity represents an upstream API or microservice that Kong
        Gateway forwards requests to.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the Service.
          readOnly: true
          example: abc123
        name:
          type: string
          description: An optional human-readable name for the Service.
          example: Example Title
        protocol:
          type: string
          description: The protocol used to communicate with the upstream.
          enum:
          - http
          - https
          - grpc
          - grpcs
          - tcp
          - tls
          - udp
          - ws
          - wss
          default: http
          example: http
        host:
          type: string
          description: The host of the upstream server.
          example: example_value
        port:
          type: integer
          description: The upstream server port.
          default: 80
          minimum: 0
          maximum: 65535
          example: 10
        path:
          type: string
          description: The path to be used in requests to the upstream server.
          example: example_value
        retries:
          type: integer
          description: The number of retries to execute upon failure to proxy.
          default: 5
          example: 10
        connect_timeout:
          type: integer
          description: >-
            The timeout in milliseconds for establishing a connection to the
            upstream server.
          default: 60000
          example: 10
        write_timeout:
          type: integer
          description: >-
            The timeout in milliseconds between two successive write
            operations for transmitting a request to the upstream server.
          default: 60000
          example: 10
        read_timeout:
          type: integer
          description: >-
            The timeout in milliseconds between two successive read
            operations for receiving a request from the upstream server.
          default: 60000
          example: 10
        url:
          type: string
          description: >-
            Shorthand attribute to set protocol, host, port, and path at once.
            Write-only convenience field.
          writeOnly: true
          example: https://www.example.com
        tags:
          type: array
          description: An optional set of strings for grouping and filtering.
          items:
            type: string
          maxItems: 20
          example: []
        client_certificate:
          type: object
          description: Certificate to be used as client certificate while TLS handshaking to the upstream server.
          properties:
            id:
              type: string
              format: uuid
          example: example_value
        tls_verify:
          type: boolean
          description: Whether to enable TLS verification of upstream server certificate.
          example: true
        tls_verify_depth:
          type: integer
          description: Maximum depth of chain while verifying upstream server TLS certificate.
          example: 10
        ca_certificates:
          type: array
          description: Array of CA Certificate object UUIDs used to verify upstream server TLS certificate.
          items:
            type: string
            format: uuid
          example: []
        enabled:
          type: boolean
          description: Whether the Service is active.
          default: true
          example: true
        created_at:
          type: integer
          description: Unix epoch timestamp of when the entity was created.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updated_at:
          type: integer
          description: Unix epoch timestamp of when the entity was last updated.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
      required:
      - host

    ServiceInput:
      type: object
      description: Input schema for creating or updating a Service.
      properties:
        name:
          type: string
          description: An optional human-readable name for the Service.
          example: Example Title
        protocol:
          type: string
          enum:
          - http
          - https
          - grpc
          - grpcs
          - tcp
          - tls
          - udp
          - ws
          - wss
          default: http
          example: http
        host:
          type: string
          description: The host of the upstream server.
          example: example_value
        port:
          type: integer
          default: 80
          minimum: 0
          maximum: 65535
          example: 10
        path:
          type: string
          example: example_value
        retries:
          type: integer
          default: 5
          example: 10
        connect_timeout:
          type: integer
          default: 60000
          example: 10
        write_timeout:
          type: integer
          default: 60000
          example: 10
        read_timeout:
          type: integer
          default: 60000
          example: 10
        url:
          type: string
          description: >-
            Shorthand attribute to set protocol, host, port, and path at once.
          writeOnly: true
          example: https://www.example.com
        tags:
          type: array
          items:
            type: string
          maxItems: 20
          example: []
        client_certificate:
          type: object
          properties:
            id:
              type: string
              format: uuid
          example: example_value
        tls_verify:
          type: boolean
          example: true
        tls_verify_depth:
          type: integer
          example: 10
        ca_certificates:
          type: array
          items:
            type: string
            format: uuid
          example: []
        enabled:
          type: boolean
          default: true

          example: true
    ServiceList:
      type: object
      description: A paginated list of Service entities.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Service'
          example: []
        next:
          type: string
          description: URI to the next page of results.
          example: example_value
        offset:
          type: string
          description: Offset token for the next page.

          example: example_value
    Route:
      type: object
      description: >-
        A Route defines rules to match client requests. Each Route is
        associated with a Service, and a Service may have multiple Routes.
        When a request matches a Route, Kong proxies the request to the
        associated Service.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the Route.
          readOnly: true
          example: abc123
        name:
          type: string
          description: An optional human-readable name for the Route.
          example: Example Title
        protocols:
          type: array
          description: An array of the protocols this Route should allow.
          items:
            type: string
            enum:
            - http
            - https
            - grpc
            - grpcs
            - tcp
            - tls
            - udp
            - ws
            - wss
          default:
          - http
          - https
          example: []
        methods:
          type: array
          description: A list of HTTP methods that match this Route.
          items:
            type: string
            enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
            - HEAD
            - CONNECT
            - TRACE
          example: []
        hosts:
          type: array
          description: A list of domain names that match this Route.
          items:
            type: string
          example: []
        paths:
          type: array
          description: A list of paths that match this Route.
          items:
            type: string
          example: []
        headers:
          type: object
          description: >-
            One or more lists of values indexed by header name that will cause
            this Route to match if present in the request.
          additionalProperties:
            type: array
            items:
              type: string
          example: example_value
        snis:
          type: array
          description: A list of SNIs that match this Route when using stream routing.
          items:
            type: string
          example: []
        sources:
          type: array
          description: A list of IP sources of incoming connections that match this Route (stream routing).
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
          example: []
        destinations:
          type: array
          description: A list of IP destinations of incoming connections that match this Route (stream routing).
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
          example: []
        https_redirect_status_code:
          type: integer
          description: The status code Kong responds with when all properties of a Route match except the protocol.
          default: 426
          enum:
          - 301
          - 302
          - 307
          - 308
          - 426
          example: 301
        regex_priority:
          type: integer
          description: A number used to choose which Route resolves a given request when several Routes match it using regexes simultaneously.
          default: 0
          example: 10
        strip_path:
          type: boolean
          description: When matching a Route via one of the paths, strip the matching prefix from the upstream request URL.
          default: true
          example: true
        path_handling:
          type: string
          description: Controls how the Service path, Route path, and requested path are combined when sending a request to the upstream.
          enum:
          - v0
          - v1
          default: v0
          example: v0
        preserve_host:
          type: boolean
          description: When matching a Route via one of the hosts domain names, use the request Host header in the upstream request headers.
          default: false
          example: true
        request_buffering:
          type: boolean
          description: Whether to enable request body buffering.
          default: true
          example: true
        response_buffering:
          type: boolean
          description: Whether to enable response body buffering.
          default: true
          example: true
        tags:
          type: array
          description: An optional set of strings for grouping and filtering.
          items:
            type: string
          maxItems: 20
          example: []
        service:
          type: object
          description: The Service this Route is associated with.
          properties:
            id:
              type: string
              format: uuid
          example: example_value
        expression:
          type: string
          description: The router expression for the Route (expressions router mode).
          example: example_value
        priority:
          type: integer
          description: The priority of the Route in expressions router mode.
          default: 0
          example: 10
        created_at:
          type: integer
          description: Unix epoch timestamp of when the entity was created.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updated_at:
          type: integer
          description: Unix epoch timestamp of when the entity was last updated.
          readOnly: true

          example: '2026-01-15T10:30:00Z'
    RouteInput:
      type: object
      description: Input schema for creating or updating a Route.
      properties:
        name:
          type: string
          example: Example Title
        protocols:
          type: array
          items:
            type: string
            enum:
            - http
            - https
            - grpc
            - grpcs
            - tcp
            - tls
            - udp
            - ws
            - wss
          default:
          - http
          - https
          example: []
        methods:
          type: array
          items:
            type: string
          example: []
        hosts:
          type: array
          items:
            type: string
          example: []
        paths:
          type: array
          items:
            type: string
          example: []
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example: example_value
        snis:
          type: array
          items:
            type: string
          example: []
        sources:
          type: array
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
          example: []
        destinations:
          type: array
          items:
            type: object
            properties:
              ip:
                type: string
              port:
                type: integer
          example: []
        https_redirect_status_code:
          type: integer
          default: 426
          example: 10
        regex_priority:
          type: integer
          default: 0
          example: 10
        strip_path:
          type: boolean
          default: true
          example: true
        path_handling:
          type: string
          enum:
          - v0
          - v1
          default: v0
          example: v0
        preserve_host:
          type: boolean
          default: false
          example: true
        request_buffering:
          type: boolean
          default: true
          example: true
        response_buffering:
          type: boolean
          default: true
          example: true
        tags:
          type: array
          items:
            type: string
          maxItems: 20
          example: []
        service:
          type: object
          properties:
            id:
              type: string
              format: uuid
          example: example_value
        expression:
          type: string
          example: example_value
        priority:
          type: integer
          default: 0

          example: 10
    RouteList:
      type: object
      description: A paginated list of Route entities.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Route'
          example: []
