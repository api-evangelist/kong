        sort: tools.sort
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: get-meter
      description: Get meter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: konnect-platform-meters.getmeter
      with:
        meterId: tools.meterId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-meter
      description: Delete meter
      hints:
        readOnly: false
