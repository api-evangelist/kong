        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemeter
        description: Delete meter
        call: konnect-platform-meters.deletemeter
        with:
          meterId: rest.meterId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
