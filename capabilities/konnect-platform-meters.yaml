    resources:
    - name: v3-openmeter-meters
      path: /v3/openmeter/meters
      operations:
      - name: createmeter
        method: POST
        description: Create meter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listmeters
        method: GET
        description: List meters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
          description: Sort meters returned in the response.
        - name: filter
          in: query
          type: string
          description: Filter meters returned in the response.
    - name: v3-openmeter-meters-meterId
      path: /v3/openmeter/meters/{meterId}
      operations:
      - name: getmeter
        method: GET
        description: Get meter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meterId
