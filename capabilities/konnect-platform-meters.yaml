        description: Delete meter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meterId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.KONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: konnect-platform-meters-rest
    port: 8080
    description: REST adapter for Konnect API - Go SDK — Meters. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v3/openmeter/meters
      name: v3-openmeter-meters
      description: REST surface for v3-openmeter-meters.
      operations:
      - method: POST
        name: createmeter
        description: Create meter
        call: konnect-platform-meters.createmeter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listmeters
        description: List meters
        call: konnect-platform-meters.listmeters
