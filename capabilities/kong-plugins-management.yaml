naftiko: "1.0.0-alpha2"

info:
  title: Kong Plugins Management
  description: >-
    Authors and manages Kong Gateway Plugins (rate-limit, JWT auth, OAuth2,
    OIDC, key-auth, request-transformer, response-transformer, CORS,
    Prometheus, OpenTelemetry, etc.) attached at the global, Service, Route,
    or Consumer scope from Naftiko spec — same declarative spec drives
    Naftiko-side governance and Kong-side enforcement.
  tags:
    - Naftiko
    - Kong
    - Partnership
    - Plugins
    - Policy
    - Governance
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: kong-admin
    description: Kong Gateway Admin API endpoint + token.
    keys:
      KONG_ADMIN_BASE: KONG_ADMIN_BASE
      KONG_ADMIN_TOKEN: KONG_ADMIN_TOKEN

capability:
  consumes:
    - namespace: kong
      type: http
      baseUri: '{{KONG_ADMIN_BASE}}'
      authentication:
        type: bearer
        token: '{{KONG_ADMIN_TOKEN}}'
      resources:
        - name: global-plugins
          path: '/plugins'
          operations:
            - name: list-plugins
              method: GET
            - name: create-plugin
              method: POST
        - name: plugin
          path: '/plugins/{{plugin_id}}'
          operations:
            - name: get-plugin
              method: GET
              inputParameters:
                - { name: plugin_id, in: path, required: true }
            - name: update-plugin
              method: PATCH
              inputParameters:
                - { name: plugin_id, in: path, required: true }
            - name: delete-plugin
              method: DELETE
              inputParameters:
                - { name: plugin_id, in: path, required: true }
        - name: service-plugins
          path: '/services/{{service_id}}/plugins'
          operations:
            - name: list-service-plugins
              method: GET
              inputParameters:
                - { name: service_id, in: path, required: true }
            - name: create-service-plugin
              method: POST
              inputParameters:
                - { name: service_id, in: path, required: true }
        - name: route-plugins
          path: '/routes/{{route_id}}/plugins'
          operations:
            - name: list-route-plugins
              method: GET
              inputParameters:
                - { name: route_id, in: path, required: true }
            - name: create-route-plugin
              method: POST
              inputParameters:
                - { name: route_id, in: path, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: kong-plugins-management-rest
      description: REST surface for managing Kong Gateway Plugins from Naftiko spec.
      resources:
        - name: global-plugins
          path: '/plugins'
          operations:
            - name: list-plugins
              method: GET
              call: kong.list-plugins
            - name: create-plugin
              method: POST
              call: kong.create-plugin
        - name: plugin
          path: '/plugins/{plugin_id}'
          operations:
            - name: get-plugin
              method: GET
              inputParameters:
                - { name: plugin_id, in: path, type: string, required: true }
              call: kong.get-plugin
            - name: update-plugin
              method: PATCH
              inputParameters:
                - { name: plugin_id, in: path, type: string, required: true }
              call: kong.update-plugin
            - name: delete-plugin
              method: DELETE
              inputParameters:
                - { name: plugin_id, in: path, type: string, required: true }
              call: kong.delete-plugin
        - name: service-plugins
          path: '/services/{service_id}/plugins'
          operations:
            - name: list-service-plugins
              method: GET
              inputParameters:
                - { name: service_id, in: path, type: string, required: true }
              call: kong.list-service-plugins
            - name: create-service-plugin
              method: POST
              inputParameters:
                - { name: service_id, in: path, type: string, required: true }
              call: kong.create-service-plugin
        - name: route-plugins
          path: '/routes/{route_id}/plugins'
          operations:
            - name: list-route-plugins
              method: GET
              inputParameters:
                - { name: route_id, in: path, type: string, required: true }
              call: kong.list-route-plugins
            - name: create-route-plugin
              method: POST
              inputParameters:
                - { name: route_id, in: path, type: string, required: true }
              call: kong.create-route-plugin

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: kong-plugins-management-mcp
      description: MCP server for managing Kong Gateway Plugins from agents.
      tools:
        - name: list-plugins
          description: List all Kong Plugins (global + per-Service + per-Route + per-Consumer).
          hints: { readOnly: true }
          call: kong.list-plugins
        - name: create-plugin
          description: Create a new global Kong Plugin (rate-limit, jwt, oauth2, transforms, etc.).
          hints: { destructiveHint: false }
          call: kong.create-plugin
        - name: get-plugin
          description: Get a single Kong Plugin.
          hints: { readOnly: true }
          inputParameters:
            - { name: plugin_id, type: string, required: true }
          call: kong.get-plugin
        - name: update-plugin
          description: Update a Kong Plugin's configuration.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: plugin_id, type: string, required: true }
          call: kong.update-plugin
        - name: delete-plugin
          description: Delete a Kong Plugin.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: plugin_id, type: string, required: true }
          call: kong.delete-plugin
        - name: list-service-plugins
          description: List Plugins attached to a Kong Service.
          hints: { readOnly: true }
          inputParameters:
            - { name: service_id, type: string, required: true }
          call: kong.list-service-plugins
        - name: create-service-plugin
          description: Create a new Plugin attached to a Kong Service.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: service_id, type: string, required: true }
          call: kong.create-service-plugin
        - name: list-route-plugins
          description: List Plugins attached to a Kong Route.
          hints: { readOnly: true }
          inputParameters:
            - { name: route_id, type: string, required: true }
          call: kong.list-route-plugins
        - name: create-route-plugin
          description: Create a new Plugin attached to a Kong Route.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: route_id, type: string, required: true }
          call: kong.create-route-plugin
