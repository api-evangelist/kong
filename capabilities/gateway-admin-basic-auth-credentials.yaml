naftiko: 1.0.0-alpha2
info:
  label: Kong Enterprise Admin API — Basic-auth credentials
  description: 'Kong Enterprise Admin API — Basic-auth credentials. 3 operations. Lead operation: Create a new Basic-auth
    credential associated with a Consumer. Self-contained Naftiko capability covering one Kong business surface.'
  tags:
  - Kong
  - Basic-auth credentials
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KONG_API_KEY: KONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-admin-basic-auth-credentials
    baseUri: ''
    description: Kong Enterprise Admin API — Basic-auth credentials business capability. Self-contained, no shared references.
    resources:
    - name: workspace-consumers-ConsumerIdForNestedEntities-basic-auth
      path: /{workspace}/consumers/{ConsumerIdForNestedEntities}/basic-auth
      operations:
      - name: createbasicauthwithconsumer
        method: POST
        description: Create a new Basic-auth credential associated with a Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workspace-consumers-ConsumerIdForNestedEntities-basic-auth-BasicAuthId
      path: /{workspace}/consumers/{ConsumerIdForNestedEntities}/basic-auth/{BasicAuthId}
      operations:
      - name: deletebasicauthwithconsumer
        method: DELETE
        description: Delete a a Basic-auth credential associated with a Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getbasicauthwithconsumer
        method: GET
        description: Get a Basic-auth credential associated with a Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Kong-Admin-Token
      value: '{{env.KONG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gateway-admin-basic-auth-credentials-rest
    port: 8080
    description: REST adapter for Kong Enterprise Admin API — Basic-auth credentials. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{workspace}/consumers/{consumeridfornestedentities}/basic-auth
      name: workspace-consumers-consumeridfornestedentities-basic-auth
      description: REST surface for workspace-consumers-ConsumerIdForNestedEntities-basic-auth.
      operations:
      - method: POST
        name: createbasicauthwithconsumer
        description: Create a new Basic-auth credential associated with a Consumer
        call: gateway-admin-basic-auth-credentials.createbasicauthwithconsumer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{workspace}/consumers/{consumeridfornestedentities}/basic-auth/{basicauthid}
      name: workspace-consumers-consumeridfornestedentities-basic-auth-basicauthid
      description: REST surface for workspace-consumers-ConsumerIdForNestedEntities-basic-auth-BasicAuthId.
      operations:
      - method: DELETE
        name: deletebasicauthwithconsumer
        description: Delete a a Basic-auth credential associated with a Consumer
        call: gateway-admin-basic-auth-credentials.deletebasicauthwithconsumer
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getbasicauthwithconsumer
        description: Get a Basic-auth credential associated with a Consumer
        call: gateway-admin-basic-auth-credentials.getbasicauthwithconsumer
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gateway-admin-basic-auth-credentials-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kong Enterprise Admin API — Basic-auth credentials. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: create-new-basic-auth-credential
      description: Create a new Basic-auth credential associated with a Consumer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-admin-basic-auth-credentials.createbasicauthwithconsumer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-basic-auth-credential-associated
      description: Delete a a Basic-auth credential associated with a Consumer
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gateway-admin-basic-auth-credentials.deletebasicauthwithconsumer
      outputParameters:
      - type: object
        mapping: $.
    - name: get-basic-auth-credential-associated
      description: Get a Basic-auth credential associated with a Consumer
      hints:
