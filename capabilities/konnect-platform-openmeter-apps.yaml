naftiko: 1.0.0-alpha2
info:
  label: Konnect API - Go SDK — OpenMeter Apps
  description: 'Konnect API - Go SDK — OpenMeter Apps. 2 operations. Lead operation: List apps. Self-contained Naftiko capability
    covering one Kong business surface.'
  tags:
  - Kong
  - OpenMeter Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KONG_API_KEY: KONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: konnect-platform-openmeter-apps
    baseUri: https://global.api.konghq.com
    description: Konnect API - Go SDK — OpenMeter Apps business capability. Self-contained, no shared references.
    resources:
    - name: v3-openmeter-apps
      path: /v3/openmeter/apps
      operations:
      - name: listapps
        method: GET
        description: List apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-openmeter-apps-appId
      path: /v3/openmeter/apps/{appId}
      operations:
      - name: getapp
        method: GET
        description: Get app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.KONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: konnect-platform-openmeter-apps-rest
    port: 8080
    description: REST adapter for Konnect API - Go SDK — OpenMeter Apps. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v3/openmeter/apps
      name: v3-openmeter-apps
      description: REST surface for v3-openmeter-apps.
      operations:
      - method: GET
        name: listapps
        description: List apps
        call: konnect-platform-openmeter-apps.listapps
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/openmeter/apps/{appid}
      name: v3-openmeter-apps-appid
      description: REST surface for v3-openmeter-apps-appId.
      operations:
      - method: GET
        name: getapp
        description: Get app
        call: konnect-platform-openmeter-apps.getapp
        with:
          appId: rest.appId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: konnect-platform-openmeter-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Konnect API - Go SDK — OpenMeter Apps. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-apps
      description: List apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: konnect-platform-openmeter-apps.listapps
      outputParameters:
      - type: object
        mapping: $.
    - name: get-app
      description: Get app
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: konnect-platform-openmeter-apps.getapp
      with:
        appId: tools.appId
      outputParameters:
      - type: object
        mapping: $.
