        name: createmtlsauthwithconsumer
        description: Create a new MTLS-auth credential associated with a Consumer
        call: gateway-admin-mtls-auth-credentials.createmtlsauthwithconsumer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
