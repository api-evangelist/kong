naftiko: 1.0.0-alpha2
info:
  label: Konnect API - Go SDK — API
  description: 'Konnect API - Go SDK — API. 5 operations. Lead operation: Create API. Self-contained Naftiko capability covering
    one Kong business surface.'
  tags:
  - Kong
  - API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KONG_API_KEY: KONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: konnect-platform-api
    baseUri: https://global.api.konghq.com
    description: Konnect API - Go SDK — API business capability. Self-contained, no shared references.
    resources:
    - name: v3-apis
      path: /v3/apis
      operations:
      - name: createapi
        method: POST
        description: Create API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listapis
        method: GET
        description: List APIs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-apis-apiId
      path: /v3/apis/{apiId}
      operations:
      - name: fetchapi
        method: GET
        description: Get an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapi
        method: PATCH
        description: Update API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: force
          in: query
          type: string
          description: If true, allows operations to be removed from the current version when using access control enforcement.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteapi
        method: DELETE
        description: Delete API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.KONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: konnect-platform-api-rest
    port: 8080
    description: REST adapter for Konnect API - Go SDK — API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v3/apis
      name: v3-apis
      description: REST surface for v3-apis.
      operations:
      - method: POST
        name: createapi
        description: Create API
        call: konnect-platform-api.createapi
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listapis
        description: List APIs
        call: konnect-platform-api.listapis
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/apis/{apiid}
      name: v3-apis-apiid
      description: REST surface for v3-apis-apiId.
      operations:
      - method: GET
        name: fetchapi
        description: Get an API
        call: konnect-platform-api.fetchapi
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapi
        description: Update API
        call: konnect-platform-api.updateapi
        with:
          force: rest.force
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapi
        description: Delete API
        call: konnect-platform-api.deleteapi
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: konnect-platform-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Konnect API - Go SDK — API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-api
      description: Create API
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: konnect-platform-api.createapi
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-apis
      description: List APIs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: konnect-platform-api.listapis
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api
      description: Get an API
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: konnect-platform-api.fetchapi
      outputParameters:
      - type: object
        mapping: $.
    - name: update-api
      description: Update API
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: konnect-platform-api.updateapi
      with:
        force: tools.force
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-api
      description: Delete API
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: konnect-platform-api.deleteapi
      outputParameters:
      - type: object
        mapping: $.
