naftiko: "1.0.0-alpha2"

info:
  title: Kong Services Discovery
  description: >-
    Pulls live Service, Route, Upstream, and Target inventory from a
    running Kong Gateway via the Admin API into Naftiko Fleet — Backstage
    sees what the gateway is currently routing to alongside Naftiko-declared
    capabilities, closing the drift gap between gateway state and capability
    catalog.
  tags:
    - Naftiko
    - Kong
    - Partnership
    - Discovery
    - Gateway
    - Inventory
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: kong-admin
    description: Kong Gateway Admin API endpoint + token.
    keys:
      KONG_ADMIN_BASE: KONG_ADMIN_BASE
      KONG_ADMIN_TOKEN: KONG_ADMIN_TOKEN

capability:
  consumes:
    - namespace: kong
      type: http
      baseUri: '{{KONG_ADMIN_BASE}}'
      authentication:
        type: bearer
        token: '{{KONG_ADMIN_TOKEN}}'
      resources:
        - name: services
          path: '/services'
          operations:
            - name: list-services
              method: GET
            - name: create-service
              method: POST
        - name: service
          path: '/services/{{service_id}}'
          operations:
            - name: get-service
              method: GET
              inputParameters:
                - { name: service_id, in: path, required: true }
            - name: delete-service
              method: DELETE
              inputParameters:
                - { name: service_id, in: path, required: true }
        - name: service-routes
          path: '/services/{{service_id}}/routes'
          operations:
            - name: list-service-routes
              method: GET
              inputParameters:
                - { name: service_id, in: path, required: true }
        - name: upstreams
          path: '/upstreams'
          operations:
            - name: list-upstreams
              method: GET
            - name: create-upstream
              method: POST
        - name: upstream-targets
          path: '/upstreams/{{upstream_id}}/targets'
          operations:
            - name: list-upstream-targets
              method: GET
              inputParameters:
                - { name: upstream_id, in: path, required: true }
            - name: create-upstream-target
              method: POST
              inputParameters:
                - { name: upstream_id, in: path, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: kong-services-discovery-rest
      description: REST surface for pulling Kong Gateway Services / Routes / Upstreams into Naftiko Fleet.
      resources:
        - name: services
          path: '/services'
          operations:
            - name: list-services
              method: GET
              call: kong.list-services
            - name: create-service
              method: POST
              call: kong.create-service
        - name: service
          path: '/services/{service_id}'
          operations:
            - name: get-service
              method: GET
              inputParameters:
                - { name: service_id, in: path, type: string, required: true }
              call: kong.get-service
            - name: delete-service
              method: DELETE
              inputParameters:
                - { name: service_id, in: path, type: string, required: true }
              call: kong.delete-service
        - name: service-routes
          path: '/services/{service_id}/routes'
          operations:
            - name: list-service-routes
              method: GET
              inputParameters:
                - { name: service_id, in: path, type: string, required: true }
              call: kong.list-service-routes
        - name: upstreams
          path: '/upstreams'
          operations:
            - name: list-upstreams
              method: GET
              call: kong.list-upstreams
            - name: create-upstream
              method: POST
              call: kong.create-upstream
        - name: upstream-targets
          path: '/upstreams/{upstream_id}/targets'
          operations:
            - name: list-upstream-targets
              method: GET
              inputParameters:
                - { name: upstream_id, in: path, type: string, required: true }
              call: kong.list-upstream-targets
            - name: create-upstream-target
              method: POST
              inputParameters:
                - { name: upstream_id, in: path, type: string, required: true }
              call: kong.create-upstream-target

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: kong-services-discovery-mcp
      description: MCP server for discovering Kong Gateway Services / Routes / Upstreams from agents.
      tools:
        - name: list-services
          description: List Kong Gateway Services (upstream backend definitions).
          hints: { readOnly: true }
          call: kong.list-services
        - name: create-service
          description: Create a new Kong Gateway Service.
          hints: { destructiveHint: false }
          call: kong.create-service
        - name: get-service
          description: Get a single Kong Gateway Service.
          hints: { readOnly: true }
          inputParameters:
            - { name: service_id, type: string, required: true }
          call: kong.get-service
        - name: delete-service
          description: Delete a Kong Gateway Service.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: service_id, type: string, required: true }
          call: kong.delete-service
        - name: list-service-routes
          description: List Routes attached to a Kong Service.
          hints: { readOnly: true }
          inputParameters:
            - { name: service_id, type: string, required: true }
          call: kong.list-service-routes
        - name: list-upstreams
          description: List Kong Upstreams (load-balanced target pools).
          hints: { readOnly: true }
          call: kong.list-upstreams
        - name: create-upstream
          description: Create a new Kong Upstream.
          hints: { destructiveHint: false }
          call: kong.create-upstream
        - name: list-upstream-targets
          description: List Targets in a Kong Upstream.
          hints: { readOnly: true }
          inputParameters:
            - { name: upstream_id, type: string, required: true }
          call: kong.list-upstream-targets
        - name: create-upstream-target
          description: Add a Target to a Kong Upstream.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: upstream_id, type: string, required: true }
          call: kong.create-upstream-target
