naftiko: 1.0.0-alpha2
info:
  label: Konnect API - Go SDK — Authentication
  description: 'Konnect API - Go SDK — Authentication. 1 operations. Lead operation: SSO Callback. Self-contained Naftiko
    capability covering one Kong business surface.'
  tags:
  - Kong
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KONG_API_KEY: KONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: konnect-platform-authentication
    baseUri: https://global.api.konghq.com
    description: Konnect API - Go SDK — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: v3-authenticate-organizationLoginPath
      path: /v3/authenticate/{organizationLoginPath}
      operations:
      - name: authenticatesso
        method: GET
        description: SSO Callback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationLoginPath
          in: path
          type: string
          description: The login path for the organization.
          required: true
        - name: return_to
          in: query
          type: string
          description: Return destination for the callback.
    authentication:
      type: bearer
      token: '{{env.KONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: konnect-platform-authentication-rest
    port: 8080
    description: REST adapter for Konnect API - Go SDK — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v3/authenticate/{organizationloginpath}
      name: v3-authenticate-organizationloginpath
      description: REST surface for v3-authenticate-organizationLoginPath.
      operations:
      - method: GET
        name: authenticatesso
        description: SSO Callback
        call: konnect-platform-authentication.authenticatesso
        with:
          organizationLoginPath: rest.organizationLoginPath
          return_to: rest.return_to
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: konnect-platform-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Konnect API - Go SDK — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: sso-callback
      description: SSO Callback
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: konnect-platform-authentication.authenticatesso
      with:
        organizationLoginPath: tools.organizationLoginPath
        return_to: tools.return_to
      outputParameters:
      - type: object
        mapping: $.
