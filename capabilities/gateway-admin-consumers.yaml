    resources:
    - name: workspace-consumers
      path: /{workspace}/consumers
      operations:
      - name: createconsumer
        method: POST
        description: Create a new Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workspace-consumers-ConsumerIdOrUsername
      path: /{workspace}/consumers/{ConsumerIdOrUsername}
      operations:
      - name: deleteconsumer
        method: DELETE
        description: Delete a Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getconsumer
        method: GET
        description: Get a Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsertconsumer
        method: PUT
        description: Upsert a Consumer
