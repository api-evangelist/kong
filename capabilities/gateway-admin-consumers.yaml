      name: workspace-consumers
      description: REST surface for workspace-consumers.
      operations:
      - method: POST
        name: createconsumer
        description: Create a new Consumer
        call: gateway-admin-consumers.createconsumer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
