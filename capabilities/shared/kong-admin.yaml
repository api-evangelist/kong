naftiko: "1.0.0-alpha1"

info:
  label: "Kong Gateway Admin API"
  description: "Kong Gateway Admin API for managing services, routes, plugins, consumers, upstreams, targets, and certificates."
  tags:
    - API Gateway
    - Kong
    - Configuration
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      KONG_ADMIN_URL: KONG_ADMIN_URL

capability:
  consumes:
    - type: http
      namespace: kong-admin
      baseUri: http://localhost:8001
      description: "Kong Gateway Admin API for gateway configuration."
      resources:
        - name: information
          path: /
          description: "Gateway node information."
          operations:
            - name: get-node-info
              method: GET
              description: "Retrieve node information including version and plugins."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-node-status
              method: GET
              description: "Retrieve node status including connections and database."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: services
          path: /services
          description: "Upstream service management."
          operations:
            - name: list-services
              method: GET
              description: "List all services."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service
              method: POST
              description: "Create a new service."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  url: "{{tools.url}}"
            - name: get-service
              method: GET
              description: "Retrieve a specific service."
              inputParameters:
                - name: service_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Service ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-service
              method: PATCH
              description: "Update a service."
              inputParameters:
                - name: service_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Service ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  url: "{{tools.url}}"
            - name: delete-service
              method: DELETE
              description: "Delete a service."
              inputParameters:
                - name: service_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Service ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: routes
          path: /routes
          description: "Route management."
          operations:
            - name: list-routes
              method: GET
              description: "List all routes."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-route
              method: POST
              description: "Create a new route."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  paths: "{{tools.paths}}"
                  service: "{{tools.service}}"
            - name: get-route
              method: GET
              description: "Retrieve a specific route."
              inputParameters:
                - name: route_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Route ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-route
              method: PATCH
              description: "Update a route."
              inputParameters:
                - name: route_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Route ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  paths: "{{tools.paths}}"
            - name: delete-route
              method: DELETE
              description: "Delete a route."
              inputParameters:
                - name: route_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Route ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: consumers
          path: /consumers
          description: "API consumer management."
          operations:
            - name: list-consumers
              method: GET
              description: "List all consumers."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-consumer
              method: POST
              description: "Create a new consumer."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
            - name: get-consumer
              method: GET
              description: "Retrieve a specific consumer."
              inputParameters:
                - name: consumer_id_or_username
                  in: path
                  type: string
                  required: true
                  description: "Consumer ID or username."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-consumer
              method: PATCH
              description: "Update a consumer."
              inputParameters:
                - name: consumer_id_or_username
                  in: path
                  type: string
                  required: true
                  description: "Consumer ID or username."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
            - name: delete-consumer
              method: DELETE
              description: "Delete a consumer."
              inputParameters:
                - name: consumer_id_or_username
                  in: path
                  type: string
                  required: true
                  description: "Consumer ID or username."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: plugins
          path: /plugins
          description: "Plugin management."
          operations:
            - name: list-plugins
              method: GET
              description: "List all configured plugins."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-plugin
              method: POST
              description: "Create a new plugin configuration."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  config: "{{tools.config}}"
            - name: get-plugin
              method: GET
              description: "Retrieve a specific plugin."
              inputParameters:
                - name: plugin_id
                  in: path
                  type: string
                  required: true
                  description: "Plugin ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-plugin
              method: PATCH
              description: "Update a plugin configuration."
              inputParameters:
                - name: plugin_id
                  in: path
                  type: string
                  required: true
                  description: "Plugin ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  config: "{{tools.config}}"
            - name: delete-plugin
              method: DELETE
              description: "Delete a plugin."
              inputParameters:
                - name: plugin_id
                  in: path
                  type: string
                  required: true
                  description: "Plugin ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-enabled-plugins
              method: GET
              description: "List all enabled plugin names on the node."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: upstreams
          path: /upstreams
          description: "Upstream and load balancing management."
          operations:
            - name: list-upstreams
              method: GET
              description: "List all upstreams."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-upstream
              method: POST
              description: "Create a new upstream."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: get-upstream
              method: GET
              description: "Retrieve a specific upstream."
              inputParameters:
                - name: upstream_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Upstream ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-upstream
              method: PATCH
              description: "Update an upstream."
              inputParameters:
                - name: upstream_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Upstream ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-upstream
              method: DELETE
              description: "Delete an upstream."
              inputParameters:
                - name: upstream_id_or_name
                  in: path
                  type: string
                  required: true
                  description: "Upstream ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: certificates
          path: /certificates
          description: "TLS certificate management."
          operations:
            - name: list-certificates
              method: GET
              description: "List all certificates."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-certificate
              method: POST
              description: "Create a new certificate."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cert: "{{tools.cert}}"
                  key: "{{tools.key}}"
            - name: get-certificate
              method: GET
              description: "Retrieve a specific certificate."
              inputParameters:
                - name: certificate_id
                  in: path
                  type: string
                  required: true
                  description: "Certificate ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-certificate
              method: PATCH
              description: "Update a certificate."
              inputParameters:
                - name: certificate_id
                  in: path
                  type: string
                  required: true
                  description: "Certificate ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cert: "{{tools.cert}}"
                  key: "{{tools.key}}"
            - name: delete-certificate
              method: DELETE
              description: "Delete a certificate."
              inputParameters:
                - name: certificate_id
                  in: path
                  type: string
                  required: true
                  description: "Certificate ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tags
          path: /tags
          description: "Tag-based entity filtering."
          operations:
            - name: list-tags
              method: GET
              description: "List all tags and entities."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: kong-admin-api
      resources:
        - path: /v1/services
          name: services
          description: "Service operations."
          operations:
            - method: GET
              name: list-services
              description: "List all services."
              call: "kong-admin.list-services"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: kong-admin-mcp
      transport: http
      tools:
        - name: get-node-info
          description: "Retrieve Kong Gateway node information."
          hints:
            readOnly: true
          call: "kong-admin.get-node-info"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-node-status
          description: "Retrieve Kong Gateway node status."
          hints:
            readOnly: true
          call: "kong-admin.get-node-status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-services
          description: "List all configured services."
          hints:
            readOnly: true
          call: "kong-admin.list-services"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service
          description: "Create a new upstream service."
          hints:
            readOnly: false
          call: "kong-admin.create-service"
          with:
            name: "tools.name"
            url: "tools.url"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service
          description: "Retrieve a specific service."
          hints:
            readOnly: true
          call: "kong-admin.get-service"
          with:
            service_id_or_name: "tools.service_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-service
          description: "Update a service configuration."
          hints:
            readOnly: false
            idempotent: true
          call: "kong-admin.update-service"
          with:
            service_id_or_name: "tools.service_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-service
          description: "Delete a service."
          hints:
            destructive: true
          call: "kong-admin.delete-service"
          with:
            service_id_or_name: "tools.service_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-routes
          description: "List all configured routes."
          hints:
            readOnly: true
          call: "kong-admin.list-routes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-route
          description: "Create a new route."
          hints:
            readOnly: false
          call: "kong-admin.create-route"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-route
          description: "Retrieve a specific route."
          hints:
            readOnly: true
          call: "kong-admin.get-route"
          with:
            route_id_or_name: "tools.route_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-route
          description: "Update a route."
          hints:
            readOnly: false
            idempotent: true
          call: "kong-admin.update-route"
          with:
            route_id_or_name: "tools.route_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-route
          description: "Delete a route."
          hints:
            destructive: true
          call: "kong-admin.delete-route"
          with:
            route_id_or_name: "tools.route_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-consumers
          description: "List all API consumers."
          hints:
            readOnly: true
          call: "kong-admin.list-consumers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-consumer
          description: "Create a new API consumer."
          hints:
            readOnly: false
          call: "kong-admin.create-consumer"
          with:
            username: "tools.username"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-consumer
          description: "Retrieve a specific consumer."
          hints:
            readOnly: true
          call: "kong-admin.get-consumer"
          with:
            consumer_id_or_username: "tools.consumer_id_or_username"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-consumer
          description: "Delete a consumer."
          hints:
            destructive: true
          call: "kong-admin.delete-consumer"
          with:
            consumer_id_or_username: "tools.consumer_id_or_username"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-plugins
          description: "List all configured plugins."
          hints:
            readOnly: true
          call: "kong-admin.list-plugins"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-plugin
          description: "Create a new plugin configuration."
          hints:
            readOnly: false
          call: "kong-admin.create-plugin"
          with:
            name: "tools.name"
            config: "tools.config"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-plugin
          description: "Retrieve a specific plugin."
          hints:
            readOnly: true
          call: "kong-admin.get-plugin"
          with:
            plugin_id: "tools.plugin_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-plugin
          description: "Delete a plugin."
          hints:
            destructive: true
          call: "kong-admin.delete-plugin"
          with:
            plugin_id: "tools.plugin_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-enabled-plugins
          description: "List all enabled plugin names."
          hints:
            readOnly: true
          call: "kong-admin.list-enabled-plugins"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-upstreams
          description: "List all upstreams."
          hints:
            readOnly: true
          call: "kong-admin.list-upstreams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-upstream
          description: "Create a new upstream."
          hints:
            readOnly: false
          call: "kong-admin.create-upstream"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-upstream
          description: "Delete an upstream."
          hints:
            destructive: true
          call: "kong-admin.delete-upstream"
          with:
            upstream_id_or_name: "tools.upstream_id_or_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-certificates
          description: "List all TLS certificates."
          hints:
            readOnly: true
          call: "kong-admin.list-certificates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tags
          description: "List all tags and tagged entities."
          hints:
            readOnly: true
          call: "kong-admin.list-tags"
          outputParameters:
            - type: object
              mapping: "$."
