naftiko: 1.0.0-alpha2
info:
  label: Kong Enterprise Admin API — Services
  description: 'Kong Enterprise Admin API — Services. 4 operations. Lead operation: Create a new Service. Self-contained Naftiko
    capability covering one Kong business surface.'
  tags:
  - Kong
  - Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KONG_API_KEY: KONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-admin-services
    baseUri: ''
    description: Kong Enterprise Admin API — Services business capability. Self-contained, no shared references.
    resources:
    - name: workspace-services
      path: /{workspace}/services
      operations:
      - name: createservice
        method: POST
        description: Create a new Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workspace-services-ServiceIdOrName
      path: /{workspace}/services/{ServiceIdOrName}
      operations:
      - name: deleteservice
        method: DELETE
        description: Delete a Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getservice
        method: GET
        description: Get a Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsertservice
        method: PUT
        description: Upsert a Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Kong-Admin-Token
      value: '{{env.KONG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gateway-admin-services-rest
    port: 8080
    description: REST adapter for Kong Enterprise Admin API — Services. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{workspace}/services
      name: workspace-services
      description: REST surface for workspace-services.
      operations:
      - method: POST
        name: createservice
        description: Create a new Service
        call: gateway-admin-services.createservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{workspace}/services/{serviceidorname}
      name: workspace-services-serviceidorname
      description: REST surface for workspace-services-ServiceIdOrName.
      operations:
      - method: DELETE
        name: deleteservice
        description: Delete a Service
        call: gateway-admin-services.deleteservice
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getservice
        description: Get a Service
        call: gateway-admin-services.getservice
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: upsertservice
        description: Upsert a Service
        call: gateway-admin-services.upsertservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gateway-admin-services-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kong Enterprise Admin API — Services. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-new-service
      description: Create a new Service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-admin-services.createservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-service
      description: Delete a Service
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gateway-admin-services.deleteservice
      outputParameters:
      - type: object
        mapping: $.
    - name: get-service
      description: Get a Service
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-admin-services.getservice
      outputParameters:
      - type: object
        mapping: $.
    - name: upsert-service
      description: Upsert a Service
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gateway-admin-services.upsertservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
