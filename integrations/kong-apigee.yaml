naftiko: 1.0.0-alpha2
info:
  label: Migrate Apigee proxies into Kong services and routes
  description: Walk an Apigee organization's API proxies and materialize an equivalent Kong service plus routes for each, preserving virtual host bindings and basic auth/JWT policy hints as Kong plugin configurations.
  tags:
  - Kong
  - Integration
  - Migration
  - apigee
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    KONG_API_KEY: KONG_API_KEY
    APIGEE_API_KEY: APIGEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: kong
    baseUri: https://global.api.konghq.com
    description: Kong API operations consumed by this integration.
    resources:
    - name: workspace-services
      path: /{workspace}/services
      operations:
      - name: create-service
        method: POST
        description: Create a Kong service mirroring an Apigee API proxy target endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: Path parameter workspace.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workspace-routes
      path: /{workspace}/routes
      operations:
      - name: create-route
        method: POST
        description: Create Kong routes mirroring Apigee proxy base paths and virtual hosts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: Path parameter workspace.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workspace-plugins
      path: /{workspace}/plugins
      operations:
      - name: create-plugin
        method: POST
        description: Enable Kong plugins that approximate the Apigee policies attached to the original proxy.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: path
          type: string
          description: Path parameter workspace.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: apigee
    baseUri: https://apigee.googleapis.com
    description: Apigee Management API operations consumed by this integration.
    resources:
    - name: v1-organizations-org-apis
      path: /v1/organizations/{org}/apis
      operations:
      - name: listapiproxies
        method: GET
        description: 'Apigee Management API: listApiProxies'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: path
          type: string
          description: Path parameter org.
          required: true
    - name: v1-organizations-org-apis-api-revisions-rev-deployments
      path: /v1/organizations/{org}/apis/{api}/revisions/{rev}/deployments
      operations:
      - name: listproxydeployments
        method: GET
        description: 'Apigee Management API: listProxyDeployments'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: path
          type: string
          description: Path parameter org.
          required: true
        - name: api
          in: path
          type: string
          description: Path parameter api.
          required: true
        - name: rev
          in: path
          type: string
          description: Path parameter rev.
          required: true
  exposes:
  - type: mcp
    namespace: kong-apigee-mcp
    description: MCP adapter for the kong-apigee integration.
    tools:
    - name: kong_apigee
      description: Execute the kong apigee integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: kong-apigee-rest
    port: 8080
    description: REST adapter for the kong-apigee integration.
    resources:
    - path: /kong-apigee
      name: kong-apigee
      description: REST surface for the kong-apigee integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the kong-apigee integration.
        call: kong_apigee
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
