- term: DCR Providers
  description: "Dynamic Client Registration Providers are configurations representing an external Identity Provider whose\
    \ clients (i.e. Applications) Konnect will be authorized to manage.\nFor instance, they will be able to perform dynamic\
    \ client registration (DCR) with the provider. \nThe DCR provider provides credentials to each DCR-enabled application\
    \ in Konnect that can be used to access Product Versions that the app is registered for."
- term: App Auth Strategies
  description: "Application Auth Strategies are sets of plugin configurations that represent how the gateway will perform\
    \ authentication and authorization for a Product Version. \nCalled “Auth Strategy” for short in the context of portals/applications.\
    \ \nThe plugins are synced to any Gateway Service that is currently linked or becomes linked to the Product Version."
