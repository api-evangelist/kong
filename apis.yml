aid: kong
name: Kong
description: >-
  Kong Gateway is the world's most popular open-source API gateway, built on
  NGINX and Lua, offering a plugin ecosystem for authentication, rate limiting,
  observability, and traffic management at any scale.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Gateway
  - Lua
  - NGINX
  - Open Source
url: >-
  https://raw.githubusercontent.com/api-evangelist/kong/refs/heads/main/apis.yml
created: '2026-03-18'
modified: '2026-03-18'
