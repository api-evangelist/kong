- aid: kong:kong-ai-gateway
  name: Kong AI Gateway
  description: Kong AI Gateway is the connectivity and governance layer for AI-native applications. Built on Kong Gateway,
    it provides a universal LLM API across providers (OpenAI, Anthropic, Gemini, Bedrock, Azure AI, Databricks, Mistral, HuggingFace
    and more), semantic caching, prompt firewalls and PII guardrails, automated RAG injection, token-level observability,
    MCP traffic governance, and Agent Gateway support for agent-to-agent (A2A) communication.
  humanURL: https://konghq.com/products/kong-ai-gateway
  tags:
  - AI Gateway
  - LLM
  - MCP
  - A2A
  properties:
  - type: Documentation
    url: https://developer.konghq.com/ai-gateway/
  - type: ChangeLog
    url: https://developer.konghq.com/gateway/changelog/
  - type: GitHubRepository
    url: https://github.com/Kong/kong
- aid: kong:kong-agent-gateway
  name: Kong Agent Gateway
  description: Kong Agent Gateway is a capability of Kong AI Gateway (GA April 2026 with AI Gateway 3.14) that governs agent-to-agent
    (A2A) communication. It enforces agent identity verification, real-time policy and prompt-injection inspection, per-agent
    cost allocation, and unified observability across LLM calls, MCP tool invocations, and A2A messages.
  humanURL: https://konghq.com/blog/product-releases/kong-agent-gateway
  tags:
  - Agent Gateway
  - A2A
  - AI Gateway
  properties:
  - type: Documentation
    url: https://developer.konghq.com/ai-gateway/
  - type: Blog
    url: https://konghq.com/blog/product-releases/kong-agent-gateway
- aid: kong:kong-event-gateway
  name: Kong Event Gateway
  description: Kong Event Gateway is a Kafka-native gateway that proxies the native Kafka protocol between producers, consumers,
    and backend clusters. It governs Kafka traffic through virtual clusters, listener-level policies, identity-aware ACLs,
    mTLS, and per-topic quotas — bringing the same governance pattern Kong Gateway provides for HTTP/gRPC to real-time event
    streams.
  humanURL: https://konghq.com/products/event-gateway
  baseURL: https://konghq.com/
  tags:
  - Event Gateway
  - Kafka
  - Streaming
  - Governance
  properties:
  - type: Documentation
    url: https://developer.konghq.com/event-gateway/
  - type: OpenAPI
    url: https://developer.konghq.com/api/konnect/event-gateway/v1/
- aid: kong:kong-mcp-registry
  name: Kong MCP Registry
  description: Kong MCP Registry (launched February 2026) is an enterprise directory inside Kong Konnect for registering,
    discovering, and governing MCP servers and AI-native tools. It provides dynamic discovery for AI agents, governance gates
    on which MCP resources are approved for use, and centralized observability of tool usage, health, and failures.
  humanURL: https://konghq.com/products/mcp-registry
  tags:
  - MCP
  - Registry
  - Konnect
  - Agentic AI
  properties:
  - type: Documentation
    url: https://developer.konghq.com/
  - type: Blog
    url: https://konghq.com/blog/product-releases/kong-mcp-registry-tech-preview
- aid: kong:kong-context-mesh
  name: Kong Context Mesh
  description: Kong Context Mesh (launched February 2026, tech preview in Konnect) automatically discovers enterprise APIs,
    transforms them into agent-consumable tooling, packages them as MCP definitions with schemas and authentication, and publishes
    them to Kong AI Gateway with inherited access controls and runtime policy enforcement.
  humanURL: https://konghq.com/blog/product-releases/introducing-kong-context-mesh
  tags:
  - Context Mesh
  - MCP
  - Agentic AI
  - Konnect
  properties:
  - type: Blog
    url: https://konghq.com/blog/product-releases/introducing-kong-context-mesh
- aid: kong:kong-mesh
  name: Kong Mesh
  description: Kong Mesh is an enterprise-grade service mesh built on Kuma and Envoy, providing universal service mesh capabilities
    across Kubernetes and virtual machine environments. It supports mTLS, traffic policies, service discovery, observability,
    and multi-zone deployments.
  humanURL: https://developer.konghq.com/mesh/
  baseURL: https://konghq.com/
  tags:
  - Envoy
  - Kubernetes
  - mTLS
  - Service Mesh
  properties:
  - type: Documentation
    url: https://developer.konghq.com/mesh/
  - type: ChangeLog
    url: https://developer.konghq.com/mesh/changelog/
  - type: GettingStarted
    url: https://developer.konghq.com/mesh/
- aid: kong:kong-insomnia
  name: Kong Insomnia
  description: Kong Insomnia is an open-source API development platform for designing, debugging, and testing APIs. It supports
    REST, GraphQL, gRPC, and WebSocket protocols and provides collections, environments, mock servers, OpenAPI editing, Git
    Sync, and native vault integrations for developers and platform teams.
  humanURL: https://developer.konghq.com/insomnia/
  baseURL: https://konghq.com/
  tags:
