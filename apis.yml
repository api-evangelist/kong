apis:
  - aid: kong:kong
    name: Kong Gateway
    description: >-
      Kong Gateway is an open-source, lightweight API gateway optimized for
      microservices, delivering unparalleled latency performance and scalability
      through a rich plugin ecosystem.
    humanURL: https://konghq.com/products/kong-gateway
    tags:
      - API Gateway
      - Open Source
    properties:
      - type: Documentation
        url: https://developer.konghq.com/gateway/
      - type: GettingStarted
        url: https://docs.konghq.com/gateway/latest/get-started/
      - type: ChangeLog
        url: https://developer.konghq.com/gateway/changelog/
      - type: GitHubRepository
        url: https://github.com/Kong/kong
  - aid: kong:kong-admin-api
    name: Kong Gateway Admin API
    description: >-
      The Kong Gateway Admin API provides a RESTful interface for configuring
      and managing Kong Gateway instances, including services, routes, plugins,
      consumers, and certificates. It is used by operators to configure the
      gateway programmatically or via decK declarative configuration.
    humanURL: https://developer.konghq.com/admin-api/
    baseURL: https://konghq.com/
    tags:
      - Admin API
      - Configuration
      - Gateway
      - REST API
    properties:
      - type: Documentation
        url: https://developer.konghq.com/admin-api/
      - type: OpenAPI
        url: openapi/kong-gateway-admin-api.yml
      - type: JSONSchema
        url: json-schema/kong-service-schema.json
      - type: JSONLD
        url: json-ld/kong-context.jsonld
      - type: GitHubRepository
        url: https://github.com/Kong/kong
  - aid: kong:kong-konnect-api
    name: Kong Konnect API
    description: >-
      The Kong Konnect API provides a programmatic interface for managing the
      Konnect cloud platform, including control planes, API products, teams,
      system accounts, and developer portal configuration. It is used to
      automate Konnect operations and integrate with CI/CD pipelines.
    humanURL: https://developer.konghq.com/konnect-api/
    baseURL: https://konghq.com/
    tags:
      - Cloud
      - Konnect
      - Management
      - REST API
    properties:
      - type: Documentation
        url: https://developer.konghq.com/konnect-api/
      - type: APIReference
        url: https://developer.konghq.com/api/
      - type: Authentication
        url: https://developer.konghq.com/konnect-api/
      - type: GitHubRepository
        url: https://github.com/Kong/kong
  - aid: kong:kong-mesh
    name: Kong Mesh
    description: >-
      Kong Mesh is an enterprise-grade service mesh built on top of Kuma and
      Envoy, providing universal service mesh capabilities across Kubernetes and
      virtual machine environments. It supports mTLS, traffic policies, service
      discovery, observability, and multi-zone deployments.
    humanURL: https://developer.konghq.com/mesh/
    baseURL: https://konghq.com/
    tags:
      - Envoy
      - Kubernetes
      - mTLS
      - Service Mesh
    properties:
      - type: Documentation
        url: https://developer.konghq.com/mesh/
      - type: ChangeLog
        url: https://developer.konghq.com/mesh/changelog/
      - type: GettingStarted
        url: https://developer.konghq.com/mesh/
  - aid: kong:kong-insomnia
    name: Kong Insomnia
    description: >-
      Kong Insomnia is an open-source API development platform for designing,
      debugging, and testing APIs. It supports REST, GraphQL, gRPC, and
      WebSocket protocols and provides collections, environments, mock servers,
      and OpenAPI spec editing for developers.
    humanURL: https://developer.konghq.com/insomnia/
    baseURL: https://konghq.com/
    tags:
      - API Client
      - Developer Tools
      - Open Source
      - Testing
    properties:
      - type: Documentation
        url: https://developer.konghq.com/insomnia/
      - type: GitHubRepository
        url: https://github.com/Kong/insomnia
