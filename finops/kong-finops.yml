providerId: kong
created: '2026-05-04'
modified: '2026-05-15'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - API Gateway
  - API Management
  - AI Gateway
  - MCP Registry
description: 'FOCUS-aligned FinOps for Kong Konnect: per-Gateway-per-month subscription with included
  request quotas (1M/mo) and per-million overages (capped at 10M/mo on Plus), plus per-LLM-model AI
  Gateway charges, per-portal and per-published-API overages, and seat-based Insomnia pricing.
  AI Gateway / Agent Gateway / MCP Registry / Event Gateway / Context Mesh ride inside the Plus or
  Enterprise envelope rather than as separate SKUs.'
sources:
  - https://konghq.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Kong Inc.
serviceCategory: API Management
billingModel:
  pricingCategory: Subscription + Usage Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Kong Konnect
  ServiceCategory: Developer Tools
  ServiceSubcategory: API Management
  ProviderName: Kong
  PublisherName: Kong Inc.
  InvoiceIssuerName: Kong Inc.
