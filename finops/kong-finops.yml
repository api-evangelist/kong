meters:
  - name: gateway_months
    unit: gateway-month
    aggregation: max
    dimensions:
      - gateway_type
      - region
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - gateway
      - service
      - consumer
  - name: ai_gateway_models
    unit: llm_model
    aggregation: max
    dimensions:
      - provider
      - model
  - name: developer_portals
    unit: portal
    aggregation: max
  - name: published_apis
    unit: api
    aggregation: max
    dimensions:
      - portal
  - name: insomnia_seats
    unit: seat-month
    aggregation: max
    dimensions:
      - plan
  - name: mcp_registry_tools
    unit: tool
    aggregation: max
    dimensions:
      - registry
      - tool_type
  - name: a2a_traffic
    unit: message
    aggregation: sum
    dimensions:
      - source_agent
      - destination_agent
  - name: event_gateway_throughput
    unit: byte
    aggregation: sum
    dimensions:
      - virtual_cluster
      - topic
principles:
  - name: Visibility
    description: Use Konnect Analytics and the Konnect API to track per-gateway request counts, model
      usage, and portal activity; export to your data warehouse for FOCUS-aligned roll-up.
  - name: Allocation
    description: Tag Konnect services and consumers with team / product metadata so per-million request
      overages and AI-model fees can be allocated to the consuming team.
  - name: Optimization
    description: Consolidate low-traffic services onto fewer Serverless gateways (each one billed); cap
      AI Gateway to the 5 LLM models the team actually uses; collapse extra Developer Portals (each
      additional portal is $200/mo) and prune low-traffic published APIs ($20 / $10 per API per portal);
      move to Enterprise once you exceed Plus gateway/portal limits, hit the 10M/mo request ceiling, or
      accrue meaningful overage spend.
  - name: Accountability
    description: Platform owners review monthly Konnect usage vs included quotas, alert on overage thresholds
      via Konnect Analytics, and reconcile Insomnia seat counts with the IdP each renewal.
maintainers:
