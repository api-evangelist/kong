specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Kong
providerId: kong
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - API Gateway
  - API Management
  - AI Gateway
description: 'FOCUS-aligned FinOps for Kong Konnect: per-Gateway-per-month subscription with included
  request quotas and per-million overages, plus per-LLM-model AI Gateway charges and seat-based Insomnia
  pricing.'
sources:
  - https://konghq.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Kong Inc.
serviceCategory: API Management
billingModel:
  pricingCategory: Subscription + Usage Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Kong Konnect
  ServiceCategory: Developer Tools
  ServiceSubcategory: API Management
  ProviderName: Kong
  PublisherName: Kong Inc.
  InvoiceIssuerName: Kong Inc.
  BillingCurrency: USD
meters:
  - name: gateway_months
    unit: gateway-month
    aggregation: max
    dimensions:
      - gateway_type
      - region
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - gateway
      - service
      - consumer
  - name: ai_gateway_models
    unit: llm_model
    aggregation: max
    dimensions:
      - provider
      - model
  - name: developer_portals
    unit: portal
    aggregation: max
  - name: published_apis
    unit: api
    aggregation: max
    dimensions:
      - portal
  - name: insomnia_seats
    unit: seat-month
    aggregation: max
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Use Konnect Analytics and the Konnect API to track per-gateway request counts, model
      usage, and portal activity; export to your data warehouse for FOCUS-aligned roll-up.
  - name: Allocation
    description: Tag Konnect services and consumers with team / product metadata so per-million request
      overages and AI-model fees can be allocated to the consuming team.
  - name: Optimization
    description: Consolidate low-traffic services onto fewer Serverless gateways (each one billed); cap
      AI Gateway to the 5 LLM models the team actually uses; move to Enterprise once you exceed Plus
      gateway/portal limits or accrue meaningful overage spend.
  - name: Accountability
    description: Platform owners review monthly Konnect usage vs included quotas, alert on overage thresholds
      via Konnect Analytics, and reconcile Insomnia seat counts with the IdP each renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
